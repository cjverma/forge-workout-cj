<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>FORGE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:#000; --g1:#111; --g2:#1c1c1c; --g3:#2a2a2a; --g4:#444; --g5:#888;
  --white:#f5f5f5; --orange:#FF6B1A; --obg:#1a0a00; --oborder:#2a1500;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
  --r:14px; --rsm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--black);}
body{font-family:'DM Sans',sans-serif;color:var(--white);max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100dvh;}

/* HEADER */
.hdr{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g2);flex-shrink:0;}
.logo{font-family:'Bebas Neue';font-size:28px;letter-spacing:4px;color:var(--orange);}
.target-badge{background:var(--obg);border:1px solid var(--oborder);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--orange);}

/* QUOTE */
.quote{background:var(--obg);border-bottom:1px solid var(--oborder);padding:7px 20px;font-size:11px;font-style:italic;color:var(--orange);text-align:center;flex-shrink:0;transition:opacity .4s;}

/* DAY PILLS */
.days{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.days::-webkit-scrollbar{display:none;}
.day-btn{flex:0 0 auto;padding:9px 16px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1.5px solid var(--g3);color:var(--g5);background:var(--g1);cursor:pointer;transition:all .18s;}
.day-btn.today{border-color:var(--orange);color:var(--orange);}
.day-btn.active{background:var(--orange);border-color:var(--orange);color:#000;}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px;padding-bottom:100px;}

/* DAY HEADER */
.day-title{font-family:'Bebas Neue';font-size:46px;letter-spacing:5px;color:var(--orange);line-height:1;padding:8px 0 4px;}
.day-sub{font-size:13px;color:var(--g5);margin-bottom:14px;}
.prog-wrap{background:var(--g2);border-radius:99px;height:5px;margin-bottom:18px;overflow:hidden;}
.prog-fill{height:100%;background:var(--orange);border-radius:99px;transition:width .4s ease;}

/* SECTION LABEL */
.sec{font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;}

/* START BUTTON */
.start-workout-btn{width:100%;padding:18px;background:var(--orange);border:none;border-radius:var(--r);font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:#000;cursor:pointer;margin-bottom:20px;transition:opacity .2s;}
.start-workout-btn:active{opacity:.85;}

/* EXERCISE CARD */
.ex-card{background:var(--g1);border:1.5px solid var(--g2);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .25s;}
.ex-card.done{border-color:var(--green);}
.ex-top{display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;}
.ex-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-gym{background:var(--orange);}
.dot-physio{background:var(--green);}
.dot-cardio{background:var(--blue);}
.ex-info{flex:1;}
.ex-name{font-size:15px;font-weight:600;line-height:1.2;}
.ex-meta{font-size:12px;color:var(--g5);margin-top:3px;}
.ex-right{display:flex;gap:8px;align-items:center;}
.watch-btn{background:var(--g2);border:1px solid var(--g3);border-radius:8px;padding:7px 11px;font-size:12px;color:var(--g5);text-decoration:none;white-space:nowrap;flex-shrink:0;}
.chev{font-size:18px;color:var(--g4);transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}

/* SETS AREA */
.sets-area{display:none;border-top:1px solid var(--g2);padding:12px 16px 14px;}
.sets-area.open{display:block;}
.cue-box{background:var(--obg);border:1px solid var(--oborder);border-left:3px solid var(--orange);border-radius:var(--rsm);padding:9px 12px;font-size:12px;color:var(--orange);margin-bottom:12px;line-height:1.5;}

/* SET ROW */
.set-row{display:grid;grid-template-columns:auto 1fr auto 1fr auto;align-items:center;gap:8px;min-height:56px;background:var(--g2);border-radius:var(--rsm);padding:0 14px;margin-bottom:8px;border:1.5px solid transparent;transition:all .2s;}
.set-row.done{border-color:var(--green);background:#0a1a0a;}
.set-label{font-size:12px;font-weight:700;color:var(--g5);white-space:nowrap;}
.set-row.done .set-label{color:var(--green);}
.set-inp{background:transparent;border:none;outline:none;font-family:'DM Sans';font-size:16px;font-weight:600;color:var(--white);text-align:center;min-width:0;width:100%;-webkit-appearance:none;}
.set-inp::placeholder{color:var(--g4);font-size:13px;font-weight:400;}
.set-x{font-size:13px;color:var(--g4);}
.set-check-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--g3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s;}
.set-check-btn.done{background:var(--green);border-color:var(--green);color:#000;}

/* CARDIO ROW */
.cardio-row{display:flex;align-items:center;justify-content:space-between;min-height:56px;background:var(--g2);border-radius:var(--rsm);padding:0 14px;margin-bottom:8px;border:1.5px solid transparent;cursor:pointer;transition:all .2s;}
.cardio-row.done{border-color:var(--green);background:#0a1a0a;}
.cardio-label{font-size:15px;font-weight:600;}
.cardio-row.done .cardio-label{color:var(--green);}

.add-set-btn{width:100%;border:1.5px dashed var(--g3);border-radius:var(--rsm);padding:10px;font-size:13px;color:var(--g4);background:transparent;cursor:pointer;font-family:'DM Sans';margin-top:4px;transition:all .2s;}
.add-set-btn:active{border-color:var(--orange);color:var(--orange);}

/* REST DAY */
.rest{text-align:center;padding:50px 0 20px;}
.rest-icon{font-size:56px;margin-bottom:14px;}
.rest-title{font-family:'Bebas Neue';font-size:46px;letter-spacing:5px;color:var(--orange);margin-bottom:8px;}
.rest-body{font-size:14px;color:var(--g5);line-height:1.7;margin-bottom:24px;}
.info-card{background:var(--g1);border:1.5px solid var(--g2);border-radius:var(--r);padding:16px;}
.info-card-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:6px;}
.info-card-body{font-size:12px;color:var(--g5);line-height:1.6;}

/* AI COACH */
.ai-card{background:var(--g1);border:1.5px solid var(--g2);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.ai-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.ai-sub{font-size:12px;color:var(--g5);margin-bottom:12px;line-height:1.5;}
.ai-inp{width:100%;background:var(--g2);border:1.5px solid var(--g3);border-radius:var(--rsm);padding:12px 14px;font-size:14px;color:var(--white);font-family:'DM Sans';outline:none;margin-bottom:10px;-webkit-appearance:none;}
.ai-inp:focus{border-color:var(--orange);}
.ai-inp-sm{background:var(--g2);border:1.5px solid var(--g3);border-radius:var(--rsm);padding:10px 12px;font-size:14px;color:var(--white);font-family:'DM Sans';outline:none;-webkit-appearance:none;width:100%;}
.ai-inp-sm:focus{border-color:var(--orange);}
.ai-btn{width:100%;background:var(--orange);border:none;border-radius:var(--rsm);padding:14px;font-size:15px;font-weight:700;color:#000;cursor:pointer;margin-bottom:10px;font-family:'DM Sans';}
.ai-btn:active{opacity:.85;}
.ai-out{background:var(--g2);border:1.5px solid var(--g3);border-radius:var(--rsm);padding:12px 14px;font-size:13px;color:var(--g5);line-height:1.7;min-height:60px;white-space:pre-wrap;display:none;}
.ai-out.show{display:block;color:var(--white);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}

/* SETTINGS */
.settings-group{background:var(--g1);border:1.5px solid var(--g2);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.settings-row{display:flex;align-items:center;padding:16px;border-bottom:1px solid var(--g2);gap:14px;cursor:pointer;}
.settings-row:last-child{border:none;}
.settings-icon{font-size:20px;width:36px;text-align:center;flex-shrink:0;}
.settings-info{flex:1;}
.settings-title{font-size:14px;font-weight:600;}
.settings-sub{font-size:12px;color:var(--g5);margin-top:2px;}
.settings-arrow{color:var(--g5);font-size:16px;}

/* EXPORT */
.export-area{width:100%;background:var(--g2);border:1.5px solid var(--g3);border-radius:var(--rsm);padding:12px;font-size:11px;color:var(--g5);font-family:monospace;min-height:200px;outline:none;resize:none;}
.btn-row{display:flex;gap:8px;margin-bottom:10px;}
.btn-outline{flex:1;background:var(--g2);border:1.5px solid var(--g3);border-radius:var(--rsm);padding:12px;font-size:14px;font-weight:700;color:var(--g5);cursor:pointer;font-family:'DM Sans';}
.btn-orange{flex:1;background:var(--orange);border:none;border-radius:var(--rsm);padding:12px;font-size:14px;font-weight:700;color:#000;cursor:pointer;font-family:'DM Sans';}

/* RULE CARDS */
.rule-card{background:var(--g1);border:1.5px solid var(--g2);border-left:3px solid var(--red);border-radius:var(--rsm);padding:12px 14px;margin-bottom:8px;}
.rule-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.rule-desc{font-size:12px;color:var(--g5);line-height:1.5;}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:var(--g1);border-top:1px solid var(--g2);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;gap:3px;cursor:pointer;color:var(--g4);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;transition:color .2s;}
.nav-item.active{color:var(--orange);}
.nav-icon{font-size:22px;}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-weight:700;font-size:14px;padding:11px 22px;border-radius:99px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* SPINNER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--g3);border-top-color:var(--orange);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">FORGE</div>

<div class="bot-nav">

const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const GYM_EQUIP='Stationary bike, treadmill, seated cable machine, chest press machine, pec fly machine, tricep extension machine, leg press machine (feet high, 90 deg max), seated leg curl, seated hip abduction machine, seated calf raise, dumbbells 5-30kg';

// ═══════ STATE ═══════
let S=JSON.parse(localStorage.getItem('forge4')||'{}');
if(!S.sessions)S.sessions={};
if(!S.weights)S.weights=[];
function save(){localStorage.setItem('forge4',JSON.stringify(S));}

let currentDay='',currentTab='workout',quoteIdx=0;

// ═══════ INIT ═══════
window.addEventListener('DOMContentLoaded',()=>{
  buildDayNav();
  const todayName=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  selectDay(todayName);
  cycleQuote();
  setInterval(cycleQuote,9000);
});

function cycleQuote(){
  const el=document.getElementById('quoteEl');
  el.style.opacity=0;
  setTimeout(()=>{el.textContent=QUOTES[quoteIdx++%QUOTES.length];el.style.opacity=1;},350);
}

// ═══════ TABS ═══════
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  document.getElementById('dayNav').style.display=tab==='workout'?'flex':'none';
  document.getElementById('mainScroll').scrollTop=0;
  if(tab==='workout') renderWorkout();
  else if(tab==='ai') renderAI();
  else if(tab==='settings') renderSettings();
}

// ═══════ DAY NAV ═══════
function buildDayNav(){
  const el=document.getElementById('dayNav');
  el.style.display='flex';
  const todayIdx=new Date().getDay()===0?6:new Date().getDay()-1;
  DAYS.forEach((d,i)=>{
    const b=document.createElement('div');
    b.className='day-btn'+(i===todayIdx?' today':'');
    b.id='pill-'+d;b.textContent=d.slice(0,3).toUpperCase();
    b.onclick=()=>selectDay(d);
    el.appendChild(b);
  });
}

function selectDay(day){
  currentDay=day;
  DAYS.forEach(d=>{const p=document.getElementById('pill-'+d);if(p)p.classList.toggle('active',d===day);});
  renderWorkout();
}

// ═══════ WORKOUT ═══════
function weekKey(){
  const d=new Date(),j=new Date(d.getFullYear(),0,1);
  return d.getFullYear()+'W'+Math.ceil(((d-j)/86400000+j.getDay()+1)/7);
}
function sessKey(day){return day+'_'+weekKey();}

function renderWorkout(){
  const prog=PROG[currentDay];
  const el=document.getElementById('tabContent');

  if(currentDay==='Sunday'){
    el.innerHTML=`
      <div class="rest">
        <div class="rest-icon">😴</div>
        <div class="rest-title">REST DAY</div>
        <div class="rest-body">Recovery is where adaptation happens.<br>Your spine rebuilds today.</div>
        <div class="info-card">
          <div class="info-card-title">✅ Still do physio exercises</div>
          <div class="info-card-body">Knee-to-chest, glute bridge, and bird dog — 10 minutes. Do these every day including Sundays. Your spine does not take rest days.</div>
        </div>
      </div>`;
    return;
  }

  const key=sessKey(currentDay);
  if(!S.sessions[key])S.sessions[key]={};
  const sess=S.sessions[key];
  const total=prog.exercises.length;
  const done=prog.exercises.filter(e=>sess[e.id]?.done).length;
  const pct=total?Math.round((done/total)*100):0;

  const gymExs=prog.exercises.filter(e=>e.cat!=='physio');
  const physioExs=prog.exercises.filter(e=>e.cat==='physio');

  let html=`
    <div class="day-title">${prog.label}</div>
    <div class="day-sub">${prog.sub} · ${done}/${total} exercises done</div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <button class="start-workout-btn" onclick="showToast('Workout started! Work through each exercise below ⬇')">⚡ START WORKOUT</button>`;

  if(gymExs.length){
    const secLabel=prog.sub.includes('Gym')?'🏋 Gym Exercises':'Exercises';
    html+=`<div class="sec">${secLabel}</div>`;
    gymExs.forEach(ex=>{html+=renderExCard(ex,sess,key);});
  }
  if(physioExs.length){
    html+=`<div class="sec">🟢 Physio — Do on Yoga Mat</div>`;
    physioExs.forEach(ex=>{html+=renderExCard(ex,sess,key);});
  }

  el.innerHTML=html;
}

function renderExCard(ex,sess,key){
  const exData=sess[ex.id]||{done:false,sets:[]};
  const isDone=exData.done;
  const dotCls=ex.cat==='physio'?'dot-physio':ex.cat==='cardio'?'dot-cardio':'dot-gym';
  const setsLabel=ex.sets===1?`1 set · ${ex.reps}`:`${ex.sets} sets × ${ex.reps}`;

  let bodyHtml='';
  if(ex.sets===1){
    // Cardio / single set
    bodyHtml=`
      <div class="cue-box">${ex.cue}</div>
      <div class="cardio-row ${isDone?'done':''}" onclick="toggleCardio('${key}','${ex.id}')">
        <div class="cardio-label">${ex.reps}</div>
        <div class="set-check-btn ${isDone?'done':''}">${isDone?'✓':'○'}</div>
      </div>`;
  } else {
    const count=Math.max(ex.sets,(exData.sets||[]).length);
    let rows='';
    for(let i=0;i<count;i++){
      const sd=(exData.sets||[])[i]||{};
      rows+=`
        <div class="set-row ${sd.done?'done':''}" id="sr-${ex.id}-${i}">
          <div class="set-label">Set ${i+1}</div>
          <input class="set-inp" type="number" placeholder="kg" value="${sd.weight||''}"
            onchange="saveField('${key}','${ex.id}',${i},'weight',this.value)" onfocus="this.select()">
          <div class="set-x">×</div>
          <input class="set-inp" type="number" placeholder="${typeof ex.reps==='number'?ex.reps:'reps'}" value="${sd.reps||''}"
            onchange="saveField('${key}','${ex.id}',${i},'reps',this.value)" onfocus="this.select()">
          <div class="set-check-btn ${sd.done?'done':''}" onclick="toggleSet('${key}','${ex.id}',${i})">${sd.done?'✓':'○'}</div>
        </div>`;
    }
    bodyHtml=`
      <div class="cue-box">${ex.cue}</div>
      ${rows}
      <button class="add-set-btn" onclick="addSet('${key}','${ex.id}')">+ Add Set</button>`;
  }

  return `
    <div class="ex-card ${isDone?'done':''}" id="ex-${ex.id}">
      <div class="ex-top" onclick="toggleExpand('${ex.id}')">
        <div class="ex-dot ${dotCls}"></div>
        <div class="ex-info">
          <div class="ex-name">${isDone?'✓ ':''} ${ex.name}</div>
          <div class="ex-meta">${setsLabel} · ${ex.hint}</div>
        </div>
        <div class="ex-right">
          <a class="watch-btn" href="${ex.url}" target="_blank" onclick="event.stopPropagation()">▶ Watch</a>
          <div class="chev" id="chev-${ex.id}">▾</div>
        </div>
      </div>
      <div class="sets-area" id="sa-${ex.id}">${bodyHtml}</div>
    </div>`;
}

function toggleExpand(id){
  const area=document.getElementById('sa-'+id);
  const chev=document.getElementById('chev-'+id);
  const open=area.classList.toggle('open');
  chev.classList.toggle('open',open);
}

function toggleSet(key,exId,i){
  ensureExData(key,exId,i);
  const sd=S.sessions[key][exId].sets[i];
  sd.done=!sd.done;
  // Check if all sets done
  const prog=PROG[currentDay];
  const ex=prog.exercises.find(e=>e.id===exId);
  if(ex){
    const exData=S.sessions[key][exId];
    const requiredSets=Math.max(ex.sets,(exData.sets||[]).length);
    exData.done=exData.sets.slice(0,requiredSets).every(s=>s.done)&&exData.sets.length>=ex.sets;
    if(sd.done) showToast('Set logged ✓');
    if(exData.done) showToast('Exercise complete! 🔥');
  }
  if(navigator.vibrate)navigator.vibrate(sd.done?[30]:[15]);
  save();
  renderWorkout();
  // Reopen card
  setTimeout(()=>{
    const area=document.getElementById('sa-'+exId);
    if(area&&!area.classList.contains('open')){area.classList.add('open');document.getElementById('chev-'+exId).classList.add('open');}
  },10);
}

function toggleCardio(key,exId){
  if(!S.sessions[key])S.sessions[key]={};
  if(!S.sessions[key][exId])S.sessions[key][exId]={done:false,sets:[]};
  S.sessions[key][exId].done=!S.sessions[key][exId].done;
  if(S.sessions[key][exId].done)showToast('Done! ✓');
  if(navigator.vibrate)navigator.vibrate([25]);
  save();
  renderWorkout();
}

function saveField(key,exId,i,field,val){
  ensureExData(key,exId,i);
  S.sessions[key][exId].sets[i][field]=val;
  save();
}

function ensureExData(key,exId,i){
  if(!S.sessions[key])S.sessions[key]={};
  if(!S.sessions[key][exId])S.sessions[key][exId]={done:false,sets:[]};
  while(S.sessions[key][exId].sets.length<=i)S.sessions[key][exId].sets.push({});
}

function addSet(key,exId){
  if(!S.sessions[key])S.sessions[key]={};
  if(!S.sessions[key][exId])S.sessions[key][exId]={done:false,sets:[]};
  S.sessions[key][exId].sets.push({});
  save();
  renderWorkout();
  setTimeout(()=>{
    const area=document.getElementById('sa-'+exId);
    if(area){area.classList.add('open');document.getElementById('chev-'+exId).classList.add('open');}
  },10);
}

async function runAI(type){
  let system='',user='',outId='';

  if(type==='conv'){
    const inp=document.getElementById('convInp').value.trim();
    if(!inp)return;
    system='You are a fitness data extraction assistant. Convert the text into a brief structured summary. Format: Exercise → Sets × Reps @ Weight. Keep it short and scannable. 3 lines max.';
    user=inp; outId='convOut';
  } else if(type==='overload'){
    const inp=document.getElementById('overloadInp').value.trim();
    if(!inp)return;
    system='You are a strength coach for someone with a lumbar spine condition (L2-L5 degeneration, no axial loading, no overhead press, seated machines only). Give micro-progression targets (add 2.5-5kg or 1-2 reps). Be specific and brief. 4 lines max.';
    user=`Last session: ${inp}\n\nWhat should my targets be today?`; outId='overloadOut';
  } else if(type==='sub'){
    const inp=document.getElementById('subInp').value.trim();
    if(!inp)return;
    system=`You are an exercise substitution expert for someone with lumbar spine issues. NO overhead movements, NO standing loaded exercises, NO barbell work. Available equipment: ${GYM_EQUIP}. Give 3 ranked alternatives. One sentence each. Be brief.`;
    user=inp; outId='subOut';
  } else if(type==='recovery'){
    const sleep=document.getElementById('sleepInp').value;
    const energy=document.getElementById('energyInp').value;
    const sore=document.getElementById('soreInp').value;
    const calf=document.getElementById('calfInp').value;
    system='You are a sports science coach. Review recovery metrics and give a clear intensity recommendation: Train normally / Train at 80% / Light session only. One paragraph max. Be direct and encouraging.';
    user=`CPAP score: ${sleep||'unknown'}/100\nEnergy: ${energy||'unknown'}/10\nSoreness: ${sore||'unknown'}/10\nCalf pain: ${calf}\n\nHow hard should I train today?`;
    outId='recoveryOut';
  }

  const outEl=document.getElementById(outId);
  outEl.className='ai-out show';
  outEl.innerHTML='<span class="spin"></span>Thinking...';

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system,messages:[{role:'user',content:user}]})
    });
    const data=await resp.json();
    outEl.textContent=data.content?.[0]?.text||'No response received.';
  } catch(e){
    outEl.textContent='Network error. Check your connection.';
  }
}

function generateExport(){
  const lines=['=== FORGE WORKOUT EXPORT ===',`Generated: ${new Date().toLocaleString()}`,''];
  lines.push('SESSIONS:');
  Object.entries(S.sessions).forEach(([key,data])=>{
    const hasData=Object.values(data).some(e=>(e.sets||[]).some(s=>s.done)||e.done);
    if(!hasData)return;
    lines.push(`\n${key}:`);
    Object.entries(data).forEach(([exId,exData])=>{
      const name=findName(exId);
      const sets=(exData.sets||[]).filter(s=>s.done).map(s=>`${s.weight||'—'}kg × ${s.reps||'—'}`).join(', ');
      const cardio=exData.done&&!sets?'Completed':'';
      if(sets||cardio)lines.push(`  ${name}: ${sets||cardio}`);
    });
  });
  document.getElementById('exportArea').value=lines.join('\n');
}

function copyExport(){
  const ta=document.getElementById('exportArea');
  if(!ta.value)generateExport();
  if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(()=>showToast('Copied! Paste into Claude ✓'));}
  else{ta.select();document.execCommand('copy');showToast('Copied ✓');}
}

function findName(id){
  for(const day of Object.values(PROG)){
    const ex=day.exercises?.find(e=>e.id===id);
    if(ex)return ex.name;
  }
  return id;
}

function clearAllData(){
  if(confirm('Clear all workout history? This cannot be undone.')){
    localStorage.removeItem('forge4');location.reload();
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
