<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>FORGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;
  --s0:#080808;
  --s1:#111;
  --s2:#181818;
  --s3:#202020;
  --b1:#252525;
  --b2:#333;
  --dim:#666;
  --mid:#888;
  --lt:#bbb;
  --white:#ede9e3;
  --orange:#FF6B1A;
  --orange-lo:#1c0a00;
  --orange-mid:#7a3200;
  --green:#22c55e;
  --green-lo:#041a08;
  --red:#ef4444;
  --amber:#f59e0b;
  --blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;overflow:hidden;background:var(--black);}
body{font-family:'Space Grotesk',sans-serif;color:var(--white);max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100dvh;}

/* ── HEADER ── */
.hdr{padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--black);}
.logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;letter-spacing:6px;color:var(--orange);text-transform:uppercase;}
.target-pill{background:var(--orange-lo);border:1px solid var(--orange-mid);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--orange);text-transform:uppercase;}

/* ── QUOTE ── */
.quote{background:var(--orange-lo);border-bottom:1px solid #1a0900;padding:7px 18px;font-size:11px;font-style:italic;color:var(--orange-mid);text-align:center;letter-spacing:0.2px;flex-shrink:0;transition:opacity .5s;}

/* ── DAY NAV ── */
.days{display:flex;gap:6px;padding:12px 18px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--b1);}
.days::-webkit-scrollbar{display:none;}
.day-btn{flex:0 0 auto;padding:5px 12px 6px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--b1);color:var(--dim);background:transparent;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:1px;}
.day-btn.today{border-color:var(--b2);color:var(--mid);}
.day-btn.active{background:var(--orange);border-color:var(--orange);color:#000;font-weight:700;}
.day-date{font-size:9px;font-weight:400;letter-spacing:0.2px;text-transform:none;opacity:0.6;}
.wk-nav{display:flex;align-items:center;padding:8px 18px 6px;gap:8px;}
.wk-nav-btn{background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--mid);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:opacity .15s;}
.wk-nav-btn:disabled{opacity:0.25;cursor:default;}
.wk-nav-lbl{flex:1;font-size:12px;color:var(--mid);text-align:center;line-height:1.5;}
.wk-nav-cur{font-size:10px;color:var(--green);display:block;}
.wk-nav-back{font-size:10px;color:var(--orange);display:block;cursor:pointer;text-decoration:underline;}
.past-banner{margin:0 18px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--b2);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--dim);text-align:center;}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px;}

/* ── PAGE HEADER ── */
.pg{padding:18px 18px 0;}
.pg-title{font-size:36px;font-weight:700;letter-spacing:-0.5px;color:var(--white);line-height:1;}
.pg-title span{color:var(--orange);}
.pg-sub{font-size:12px;color:var(--dim);margin-top:5px;letter-spacing:0.2px;}

/* ── PROGRESS ── */
.prog-wrap{margin:14px 18px 0;height:2px;background:var(--b1);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--orange);border-radius:99px;transition:width .5s ease;}

/* ── SESSION BAR ── */
.session-bar{margin:12px 18px;display:flex;gap:10px;}
.btn-start{flex:1;padding:15px;background:var(--orange);border:none;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;color:#000;cursor:pointer;text-transform:uppercase;transition:opacity .15s;}
.btn-start:active{opacity:.8;}
.btn-stop{flex:1;padding:15px;background:transparent;border:1px solid var(--red);border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;color:var(--red);cursor:pointer;text-transform:uppercase;display:none;}
.btn-stop.show{display:block;}
.btn-start.hide{display:none;}

/* ── SECTION LABEL ── */
.sec{padding:16px 18px 8px;font-size:10px;font-weight:600;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;}

/* ── EXERCISE CARD ── */
.ex-card{
  margin:0 18px 8px;
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:12px;
  overflow:hidden;
  transition:border-color .25s, box-shadow .25s;
}
.ex-card.active-card{
  border-color:var(--orange);
  box-shadow:0 0 0 1px var(--orange), 0 0 20px rgba(255,107,26,0.15);
}
.ex-card.done{border-color:#1a4a1a;box-shadow:0 0 0 1px #1a4a1a;}
.ex-card.skipped{opacity:.45;border-color:var(--b1);}

.ex-top{display:flex;align-items:center;padding:14px 14px;gap:10px;cursor:pointer;}
.ex-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.ex-icon.gym{background:#1a0800;}
.ex-icon.physio{background:#041a08;}
.ex-icon.cardio{background:#04081a;}

.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:600;letter-spacing:-0.2px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-card.done .ex-name{color:var(--dim);}
.ex-meta{font-size:11px;color:var(--dim);margin-top:3px;}

.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.watch-chip{background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:500;color:var(--mid);text-decoration:none;white-space:nowrap;}
.ex-chev{color:var(--b2);font-size:16px;transition:transform .2s;}
.ex-chev.open{transform:rotate(180deg);}

/* ── SETS BODY ── */
.sets-body{display:none;border-top:1px solid var(--b1);}
.sets-body.open{display:block;}

.cue-box{margin:12px 14px 10px;padding:10px 13px;border-left:2px solid var(--orange);background:var(--orange-lo);border-radius:0 6px 6px 0;font-size:12px;color:var(--orange-mid);line-height:1.6;}

.action-row{display:flex;gap:8px;padding:0 14px 10px;}
.skip-btn{background:transparent;border:1px solid var(--b2);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:500;color:var(--dim);cursor:pointer;font-family:'Space Grotesk',sans-serif;letter-spacing:0.3px;}
.skip-btn:active{border-color:var(--mid);color:var(--lt);}

/* ── SET ROWS ── */
.sets-wrap{padding:0 14px 4px;}
.set-hdr{display:grid;grid-template-columns:42px 1fr 16px 1fr 44px;gap:6px;padding:0 2px 6px;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;text-align:center;}

.set-row{
  display:grid;grid-template-columns:42px 1fr 16px 1fr 44px;
  gap:6px;align-items:center;min-height:54px;
  background:var(--s2);border-radius:8px;padding:0 10px;
  margin-bottom:6px;border:1px solid transparent;transition:all .2s;
}
.set-row.done{background:var(--green-lo);border-color:#0a3014;}
.set-row.needs-input{border-color:var(--amber);}

.sn{font-size:12px;font-weight:600;color:var(--dim);text-align:center;}
.set-row.done .sn{color:var(--green);}

.si{width:100%;background:transparent;border:none;outline:none;font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--white);text-align:center;-webkit-appearance:none;}
.si::placeholder{color:var(--b2);font-size:14px;font-weight:400;}
.set-row.done .si{color:var(--mid);}
.sx{font-size:12px;color:var(--dim);text-align:center;}

.sdone{width:36px;height:36px;border-radius:6px;border:1px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);transition:all .15s;flex-shrink:0;margin:0 auto;}
.sdone.done{background:var(--green);border-color:var(--green);color:#000;}
.sdone.locked{opacity:.3;cursor:not-allowed;}

/* Cardio */
.cardio-row{display:flex;align-items:center;justify-content:space-between;min-height:54px;background:var(--s2);border-radius:8px;padding:0 14px;margin-bottom:6px;border:1px solid transparent;cursor:pointer;transition:all .2s;}
.cardio-row.done{background:var(--green-lo);border-color:#0a3014;}
.cardio-dur{font-size:18px;font-weight:600;letter-spacing:-0.3px;}
.cardio-row.done .cardio-dur{color:var(--green);}
.cardio-chk{width:36px;height:36px;border-radius:6px;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);transition:all .2s;}
.cardio-row.done .cardio-chk{background:var(--green);border-color:var(--green);color:#000;}

.add-set-btn{width:100%;border:1px dashed var(--b2);border-radius:8px;padding:9px;font-size:12px;font-weight:500;color:var(--dim);background:transparent;cursor:pointer;font-family:'Space Grotesk',sans-serif;margin-top:2px;margin-bottom:10px;transition:all .15s;}
.add-set-btn:active{border-color:var(--orange);color:var(--orange);}

/* ── CUSTOM EX ── */
.custom-wrap{margin:0 18px 12px;}
.custom-trigger{width:100%;padding:12px;border:1px dashed var(--b2);border-radius:8px;background:transparent;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--dim);text-transform:uppercase;transition:all .15s;}
.custom-trigger:active{border-color:var(--orange);color:var(--orange);}

.custom-form{display:none;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-top:8px;}
.custom-form.open{display:block;}
.cf-label{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:5px;}
.search-wrap{position:relative;margin-bottom:12px;}
.cf-inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:11px 13px;font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--white);outline:none;-webkit-appearance:none;}
.cf-inp:focus{border-color:var(--orange);}
.cf-inp::placeholder{color:var(--dim);}
.search-dd{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--s2);border:1px solid var(--orange);border-top:none;border-radius:0 0 10px 10px;max-height:340px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.6);}
.search-dd.show{display:block;}
.dd-item{padding:13px 14px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:1px solid var(--b1);transition:background .1s;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dd-item:last-child{border:none;}
.dd-item:active{background:var(--s3);}
.dd-item-left{flex:1;}
.dd-name{font-size:14px;font-weight:500;}
.dd-cat{font-size:11px;color:var(--dim);margin-top:3px;}
.dd-add-btn{background:var(--orange);border:none;border-radius:6px;padding:6px 12px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:#000;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.num-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.cf-num{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:11px;font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--white);outline:none;text-align:center;-webkit-appearance:none;}
.cf-num:focus{border-color:var(--orange);}
.cf-num::placeholder{color:var(--dim);font-size:13px;font-weight:400;}
.cf-add{width:100%;padding:13px;background:var(--orange);border:none;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;color:#000;cursor:pointer;text-transform:uppercase;}
.cf-add:active{opacity:.85;}

/* ── REST DAY ── */
.rest-screen{padding:48px 18px 20px;text-align:center;}
.rest-emoji{font-size:48px;margin-bottom:14px;}
.rest-ttl{font-size:32px;font-weight:700;letter-spacing:-0.5px;color:var(--orange);margin-bottom:8px;}
.rest-body{font-size:14px;color:var(--mid);line-height:1.7;margin-bottom:22px;}
.rest-card{background:var(--s1);border:1px solid var(--b1);border-left:2px solid var(--green);border-radius:0 10px 10px 0;padding:14px 16px;text-align:left;}
.rest-card-title{font-size:13px;font-weight:600;color:var(--green);margin-bottom:5px;}
.rest-card-body{font-size:12px;color:var(--mid);line-height:1.6;}

/* ── AI ── */
.ai-wrap{padding:18px;}
.ai-pg-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
.ai-pg-title span{color:var(--orange);}
.ai-pg-sub{font-size:12px;color:var(--dim);margin-bottom:18px;}
.ai-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:12px;}
.ai-card-title{font-size:15px;font-weight:700;letter-spacing:-0.2px;margin-bottom:4px;}
.ai-card-sub{font-size:12px;color:var(--mid);margin-bottom:12px;line-height:1.5;}
.ai-inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px 13px;font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--white);outline:none;margin-bottom:10px;-webkit-appearance:none;}
.ai-inp:focus{border-color:var(--orange);}
.ai-inp::placeholder{color:var(--dim);}
.ai-btn{width:100%;padding:13px;background:var(--orange);border:none;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:#000;cursor:pointer;text-transform:uppercase;margin-bottom:10px;}
.ai-btn:active{opacity:.85;}
.ai-out{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px 13px;font-size:12px;color:var(--mid);line-height:1.7;white-space:pre-wrap;display:none;}
.ai-out.show{display:block;color:var(--lt);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.ai-sm{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px;font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--white);outline:none;text-align:center;-webkit-appearance:none;}
.ai-sm:focus{border-color:var(--orange);}
.ai-sm::placeholder{color:var(--dim);font-size:12px;font-weight:400;}
.ai-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:5px;}

/* ── SETTINGS ── */
.st-wrap{padding:18px;}
.st-pg-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px;}
.st-pg-title span{color:var(--orange);}
.st-pg-sub{font-size:12px;color:var(--dim);margin-bottom:18px;}
.st-sec{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:16px 0 8px;}
.export-card{background:var(--s1);border:1px solid var(--b1);border-left:2px solid var(--orange);border-radius:0 12px 12px 0;padding:16px;margin-bottom:14px;}
.export-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.export-sub{font-size:12px;color:var(--mid);margin-bottom:12px;line-height:1.5;}
.btn-row{display:flex;gap:8px;margin-bottom:10px;}
.btn-o{flex:1;padding:12px;background:var(--orange);border:none;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.5px;color:#000;cursor:pointer;}
.btn-g{flex:1;padding:12px;background:transparent;border:1px solid var(--b2);border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.5px;color:var(--mid);cursor:pointer;}
.export-area{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px;font-size:11px;color:var(--dim);font-family:monospace;min-height:160px;outline:none;resize:none;}
.rule-item{background:var(--s1);border:1px solid var(--b1);border-left:2px solid var(--red);border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:7px;}
.rule-ttl{font-size:13px;font-weight:600;margin-bottom:3px;}
.rule-desc{font-size:12px;color:var(--mid);line-height:1.5;}
.st-group{background:var(--s1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.st-row{display:flex;align-items:center;padding:14px;gap:12px;border-bottom:1px solid var(--b1);cursor:pointer;}
.st-row:last-child{border:none;}
.st-icon{font-size:16px;width:28px;text-align:center;flex-shrink:0;}
.st-info{flex:1;}
.st-ttl{font-size:14px;font-weight:600;}
.st-sub{font-size:12px;color:var(--mid);margin-top:2px;}

/* ── BOTTOM NAV ── */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:var(--s0);border-top:1px solid var(--b1);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;gap:3px;cursor:pointer;color:var(--dim);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:color .15s;}
.nav-item.active{color:var(--orange);}
.nav-icon{font-size:20px;}

/* ── TOAST ── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid var(--orange);border-radius:8px;color:var(--white);font-weight:600;font-size:13px;letter-spacing:0.2px;padding:10px 20px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── SUMMARY ── */
.summary{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:400;flex-direction:column;align-items:center;justify-content:center;padding:32px;max-width:430px;left:50%;transform:translateX(-50%);}
.summary.show{display:flex;}
.sum-icon{font-size:52px;margin-bottom:14px;}
.sum-title{font-size:32px;font-weight:700;letter-spacing:-0.5px;color:var(--orange);margin-bottom:6px;text-align:center;}
.sum-sub{font-size:14px;color:var(--mid);text-align:center;margin-bottom:26px;line-height:1.6;}
.sum-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:26px;}
.sum-stat{background:var(--s1);border:1px solid var(--b1);border-top:2px solid var(--orange);border-radius:10px;padding:16px;text-align:center;}
.sum-val{font-size:32px;font-weight:700;color:var(--orange);letter-spacing:-0.5px;}
.sum-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-top:4px;}
.sum-close{width:100%;padding:16px;background:var(--orange);border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;color:#000;cursor:pointer;text-transform:uppercase;}

/* ── SPINNER ── */
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--b2);border-top-color:var(--orange);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── LOCK SCREEN ── */
.lock-screen{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;max-width:430px;margin:0 auto;}
.lock-logo{font-size:26px;font-weight:700;letter-spacing:8px;color:var(--orange);text-transform:uppercase;margin-bottom:6px;}
.lock-sub{font-size:12px;color:var(--dim);letter-spacing:0.5px;margin-bottom:44px;text-align:center;line-height:1.6;}
.lock-input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:15px 16px;font-size:14px;color:var(--white);font-family:inherit;outline:none;margin-bottom:12px;}
.lock-input:focus{border-color:var(--orange);}
.lock-btn{width:100%;background:var(--orange);color:#000;border:none;border-radius:10px;padding:15px;font-size:13px;font-weight:700;font-family:inherit;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:4px;}

.plan-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:450;overflow-y:auto;padding:24px 20px 48px;max-width:430px;left:50%;transform:translateX(-50%);box-sizing:border-box;}
.plan-modal.show{display:block;}
.pm-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:var(--orange);margin-bottom:4px;margin-top:8px;}
.pm-sub{font-size:12px;color:var(--mid);margin-bottom:18px;line-height:1.6;}
.pm-section{font-size:10px;font-weight:600;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:16px 0 8px;}
.pm-notes{background:var(--s1);border:1px solid var(--b1);border-left:2px solid var(--orange);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;color:var(--lt);line-height:1.7;margin-bottom:6px;}
.pm-flag{background:var(--s1);border:1px solid var(--b1);border-left:2px solid var(--red);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--mid);line-height:1.5;margin-bottom:6px;}
.pm-change{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;margin-bottom:6px;}
.pm-change-day{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--orange);text-transform:uppercase;margin-bottom:3px;}
.pm-change-ex{font-size:13px;font-weight:600;}
.pm-change-val{font-size:11px;color:var(--mid);margin-top:2px;}
.pm-btns{display:flex;gap:10px;margin-top:22px;}
.pm-apply{flex:1;padding:15px;background:var(--orange);border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:#000;cursor:pointer;text-transform:uppercase;}
.pm-cancel{flex:1;padding:15px;background:transparent;border:1px solid var(--b2);border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--mid);cursor:pointer;}

if(!S.sessions)S.sessions={};
if(!S.custom)S.custom={};
hydrateCustomExercises();
applyPlanOverrides();
function save(){localStorage.setItem("f5",JSON.stringify(S));}

function applyPlanOverrides(){
  // Migrate legacy S.plan → S.weekPlans keyed by ISO week
  if(S.plan&&!S.weekPlans){
    S.weekPlans={};
    S.weekPlans[wk()]=S.plan;
    delete S.plan;
    save();
  }
  const weekPlan=(S.weekPlans||{})[wk()];
  if(!weekPlan)return;
  for(const[day,updates]of Object.entries(weekPlan)){
    if(!PROG[day]||!Array.isArray(updates))continue;
    for(const upd of updates){
      if(upd.action==="remove"){
        PROG[day].exercises=PROG[day].exercises.filter(e=>e.id!==upd.id);
      } else if(upd.action==="add"){
        if(!PROG[day].exercises.find(e=>e.id===upd.id)){
          PROG[day].exercises.push({id:upd.id,name:upd.name,cat:upd.cat||"gym",sets:upd.sets,reps:upd.reps,hint:upd.hint||"",url:upd.url||"",cue:upd.cue||"",muscles:upd.muscles||[]});
        }
      } else {
        const ex=PROG[day].exercises.find(e=>e.id===upd.id);
        if(!ex)continue;
        if(upd.sets!==undefined)ex.sets=upd.sets;
        if(upd.reps!==undefined)ex.reps=upd.reps;
        if(upd.hint!==undefined)ex.hint=upd.hint;
      }
    }
  }
}

function hydrateCustomExercises(){
  Object.entries(S.custom||{}).forEach(([day,exs])=>{
    if(!PROG[day]||!Array.isArray(exs))return;
    const ids=new Set(PROG[day].exercises.map(ex=>ex.id));
    exs.forEach(ex=>{if(ex&&ex.id&&!ids.has(ex.id)){PROG[day].exercises.push(ex);ids.add(ex.id);}});
  });
}

function rememberCustom(day,ex){
  if(!S.custom)S.custom={};
  if(!S.custom[day])S.custom[day]=[];
  if(!S.custom[day].some(e=>e.id===ex.id))S.custom[day].push(ex);
}

function esc(v){
  return String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
}

function wk(){const d=new Date(),j=new Date(d.getFullYear(),0,1);return d.getFullYear()+"W"+Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function nextWk(){const d=new Date();d.setDate(d.getDate()+7);const j=new Date(d.getFullYear(),0,1);return d.getFullYear()+"W"+Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function weekLabel(wkStr){const m=wkStr.match(/(\d{4})W(\d+)/);if(!m)return wkStr;const yr=+m[1],wn=+m[2],jan1=new Date(yr,0,1),dow=jan1.getDay()||7,mon=new Date(yr,0,1+(wn-1)*7-(dow-1));return mon.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
let _viewWk=null;
function vwk(){return _viewWk||wk();}
function wkOrd(w){const m=(w||"").match(/(\d{4})W(\d+)/);return m?+m[1]*100+(+m[2]):0;}
function isPast(){return !!_viewWk&&wkOrd(_viewWk)<wkOrd(wk());}
function sk(day){return day+"_"+vwk();}
function shiftWeek(delta){
  const base=vwk();
  const m=base.match(/(\d{4})W(\d+)/);if(!m)return;
  const yr=+m[1],wn=+m[2],jan1=new Date(yr,0,1),dow=jan1.getDay()||7;
  const mon=new Date(yr,0,1+(wn-1)*7-(dow-1));
  mon.setDate(mon.getDate()+delta*7);
  const j=new Date(mon.getFullYear(),0,1);
  const nw=mon.getFullYear()+"W"+Math.ceil(((mon-j)/86400000+j.getDay()+1)/7);
  _viewWk=wkOrd(nw)>=wkOrd(wk())?null:nw;
  updateDayNavDates();renderW();
}
function goCurrentWeek(){_viewWk=null;updateDayNavDates();renderW();}
function updateDayNavDates(){
  const m=vwk().match(/(\d{4})W(\d+)/);if(!m)return;
  const yr=+m[1],wn=+m[2],jan1=new Date(yr,0,1),dow=jan1.getDay()||7;
  const mon=new Date(yr,0,1+(wn-1)*7-(dow-1));
  DAYS.forEach((d,i)=>{
    const btn=document.getElementById("p-"+d);if(!btn)return;
    const dd=new Date(mon);dd.setDate(mon.getDate()+i);
    const lbl=dd.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
    btn.innerHTML=`<span>${d.slice(0,3).toUpperCase()}</span><small class="day-date">${lbl}</small>`;
  });
}

function renderW(){
  const prog=PROG[cDay],el=document.getElementById("tc");
  const past=isPast();
  const cwk=wk();
  const wkLbl=past?weekLabel(vwk()):"This Week";
  const wkNav=`<div class="wk-nav">
    <button class="wk-nav-btn" onclick="shiftWeek(-1)">← Prev</button>
    <div class="wk-nav-lbl">${esc(wkLbl)}${past
      ?`<span class="wk-nav-back" onclick="goCurrentWeek()">↩ Back to this week</span>`
      :`<span class="wk-nav-cur">${esc(weekLabel(cwk))}</span>`}
    </div>
    <button class="wk-nav-btn" ${past?'':'disabled'} onclick="shiftWeek(1)">Next →</button>
  </div>`;

  if(cDay==="Sunday"){
    el.innerHTML=wkNav+`<div class="rest-screen"><div class="rest-emoji">😴</div><div class="rest-ttl">Rest Day</div><div class="rest-body">Recovery is where adaptation happens.<br>Your spine rebuilds today.</div><div class="rest-card"><div class="rest-card-title">✅ Still do physio exercises</div><div class="rest-card-body">Knee-to-chest, glute bridge, and bird dog — 10 minutes. Every day including Sundays.</div></div></div>`;
    return;
  }
  const key=sk(cDay);
  if(!past&&!S.sessions[key])S.sessions[key]={};
  const sess=S.sessions[key]||{};
  const total=prog.exercises.length;
  const done=prog.exercises.filter(e=>sess[e.id]?.done).length;
  const pct=total?Math.round((done/total)*100):0;
  const gymExs=prog.exercises.filter(e=>e.cat!=="physio");
  const physioExs=prog.exercises.filter(e=>e.cat==="physio");

  let h=wkNav;
  if(past)h+=`<div class="past-banner">📅 Past week · View only</div>`;
  h+=`<div class="pg"><div class="pg-title">${prog.label} <span>·</span></div><div class="pg-sub">${prog.sub} &nbsp;·&nbsp; ${done} of ${total} complete</div></div>
  <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>`;
  if(!past)h+=`<div class="session-bar">
    <button class="btn-start${workoutOn?" hide":""}" id="bStart" onclick="startSess()">⚡ Start Workout</button>
    <button class="btn-stop${workoutOn?" show":""}" id="bStop" onclick="stopSess()">■ Stop Workout</button>
  </div>`;

  if(gymExs.length){h+=`<div class="sec">${prog.sub.includes("Gym")?"🏋 Gym":"Exercises"}</div>`;gymExs.forEach(ex=>{h+=card(ex,sess,key,past);});}
  if(physioExs.length){h+=`<div class="sec">🟢 Physio — Yoga Mat</div>`;physioExs.forEach(ex=>{h+=card(ex,sess,key,past);});}

  if(!past)h+=`<div class="custom-wrap">
    <button class="custom-trigger" onclick="toggleCF()">+ Add Custom Exercise</button>
    <div class="custom-form" id="cf">
      <label class="cf-label">Search exercise library</label>
      <div class="search-wrap">
        <input class="cf-inp" id="cfSearch" placeholder="Type exercise name to search..." oninput="searchEx(this.value,'${cDay}')" autocomplete="off">
        <div class="search-dd" id="cfDD"></div>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:8px;letter-spacing:0.2px">Tap + on any result to add directly to today's session</div>
    </div>
  </div>`;
  h+=`<div style="height:12px"></div>`;
  el.innerHTML=h;
}

function card(ex,sess,key,rdOnly=false){
  const ed=sess[ex.id]||{done:false,sets:[],skipped:false};
  const isDone=ed.done,isSkip=ed.skipped;
  const icon=ex.cat==="physio"?"🟢":ex.cat==="cardio"?"🚴":"💪";
  const iconCls=ex.cat==="physio"?"physio":ex.cat==="cardio"?"cardio":"gym";
  const sLbl=ex.sets===1?`1 set · ${ex.reps}`:`${ex.sets} sets × ${ex.reps}`;
  const cls=isSkip?"skipped":isDone?"done":"";
  const isActive=document.getElementById("sb-"+ex.id)?.classList.contains("open");
  const name=esc(ex.name),hint=esc(ex.hint),cue=esc(ex.cue),url=esc(ex.url),reps=esc(ex.reps);
  let body="";
  if(ex.sets===1){
    const cardioEvt=rdOnly?'':` onclick="toggleCardio('${key}','${ex.id}')"`;
    body=`<div class="cue-box">${cue}</div>
    <div class="action-row"><a class="watch-chip" href="${url}" target="_blank">▶ Watch</a>${!isDone&&!isSkip&&!rdOnly?`<button class="skip-btn" onclick="skipEx('${key}','${ex.id}')">Skip</button>`:""}</div>
    <div class="sets-wrap"><div class="cardio-row ${isDone?"done":""}${rdOnly?" style='cursor:default'":""}"${cardioEvt}><div class="cardio-dur">${reps}</div><div class="cardio-chk">${isDone?"✓":"○"}</div></div></div>`;
  } else {
    const cnt=Math.max(ex.sets,(ed.sets||[]).length);
    let rows=`<div class="set-hdr"><div>Set</div><div>KG</div><div></div><div>Reps</div><div></div></div>`;
    for(let i=0;i<cnt;i++){
      const sd=(ed.sets||[])[i]||{};
      const hasD=sd.weight&&sd.reps;
      const rCls=sd.done?"done":(!hasD&&sd.attempted?"needs-input":"");
      rows+=`<div class="set-row ${rCls}" id="sr-${ex.id}-${i}">
        <div class="sn">${i+1}</div>
        <input class="si" type="number" placeholder="${hint||"kg"}" value="${esc(sd.weight)}" ${rdOnly?'disabled':''} onchange="saveF('${key}','${ex.id}',${i},'weight',this.value)" onfocus="this.select()">
        <div class="sx">×</div>
        <input class="si" type="number" placeholder="${typeof ex.reps==="number"?ex.reps:"—"}" value="${esc(sd.reps)}" ${rdOnly?'disabled':''} onchange="saveF('${key}','${ex.id}',${i},'reps',this.value)" onfocus="this.select()">
        <button class="sdone ${sd.done?"done":""} ${!hasD?"locked":""}" ${rdOnly?'disabled':''} onclick="toggleSet('${key}','${ex.id}',${i})" title="${!hasD?"Enter weight and reps first":"Done"}">${sd.done?"✓":"○"}</button>
      </div>`;
    }
    body=`<div class="cue-box">${cue}</div>
    <div class="action-row"><a class="watch-chip" href="${url}" target="_blank">▶ Watch</a>${!isDone&&!isSkip&&!rdOnly?`<button class="skip-btn" onclick="skipEx('${key}','${ex.id}')">Skip</button>`:""}</div>
    <div class="sets-wrap">${rows}${!rdOnly?`<button class="add-set-btn" onclick="addSet('${key}','${ex.id}')">+ Add Set</button>`:""}</div>`;
  }

  return `<div class="ex-card ${cls}${isActive?" active-card":""}" id="ex-${ex.id}">
    <div class="ex-top" onclick="expand('${ex.id}')">
      <div class="ex-icon ${iconCls}">${icon}</div>
      <div class="ex-info"><div class="ex-name">${isSkip?"⊘ ":isDone?"✓ ":""}${name}</div><div class="ex-meta">${esc(sLbl)} · ${hint}</div></div>
      <div class="ex-right"><div class="ex-chev" id="chev-${ex.id}">▾</div></div>
    </div>
    <div class="sets-body" id="sb-${ex.id}">${body}</div>
  </div>`;
}

function expand(id){
  const body=document.getElementById("sb-"+id);
  const chev=document.getElementById("chev-"+id);
  const card=document.getElementById("ex-"+id);
  const open=body.classList.toggle("open");
  chev.classList.toggle("open",open);
  card.classList.toggle("active-card",open&&!card.classList.contains("done")&&!card.classList.contains("skipped"));
}

function ensure(key,exId,i){
  if(!S.sessions[key])S.sessions[key]={};
  if(!S.sessions[key][exId])S.sessions[key][exId]={done:false,sets:[],skipped:false};
  while(S.sessions[key][exId].sets.length<=i)S.sessions[key][exId].sets.push({});
}

function saveF(key,exId,i,field,val){
  if(isPast())return;
  ensure(key,exId,i);
  S.sessions[key][exId].sets[i][field]=val;
  S.sessions[key][exId].sets[i].attempted=true;
  updateExerciseDone(key,exId);
  save();
  const sd=S.sessions[key][exId].sets[i];
  const row=document.getElementById("sr-"+exId+"-"+i);
  if(row){const btn=row.querySelector(".sdone");const hasD=sd.weight&&sd.reps;if(btn){btn.classList.toggle("locked",!hasD);btn.title=hasD?"Done":"Enter weight and reps first";}}
  reCard(key,exId);
}

function updateExerciseDone(key,exId){
  const prog=PROG[cDay];
  const ex=prog?.exercises.find(e=>e.id===exId);
  const ed=S.sessions[key]?.[exId];
  if(!ex||!ed||ex.sets===1)return;
  ed.sets.forEach(s=>{if(!s.weight||!s.reps)s.done=false;});
  ed.done=ed.sets.length>=ex.sets&&ed.sets.slice(0,ex.sets).every(s=>s.weight&&s.reps&&s.done);
}

function toggleSet(key,exId,i){
  if(isPast())return;
  ensure(key,exId,i);
  const sd=S.sessions[key][exId].sets[i];
  if(!sd.weight||!sd.reps){showToast("Enter weight and reps first");return;}
  sd.done=!sd.done;sd.attempted=true;
  const prog=PROG[cDay];
  const ex=prog.exercises.find(e=>e.id===exId)||{sets:1};
  const ed=S.sessions[key][exId];
  updateExerciseDone(key,exId);
  if(sd.done)showToast("Set logged ✓");
  if(ed.done)showToast("Exercise complete 🔥");
  if(navigator.vibrate)navigator.vibrate(sd.done?[30]:[15]);
  save();reCard(key,exId);
}

function toggleCardio(key,exId){
  if(isPast())return;
  if(!S.sessions[key])S.sessions[key]={};
  if(!S.sessions[key][exId])S.sessions[key][exId]={done:false,sets:[],skipped:false};
  S.sessions[key][exId].done=!S.sessions[key][exId].done;
  if(S.sessions[key][exId].done)showToast("Done ✓");
  if(navigator.vibrate)navigator.vibrate([25]);
  save();renderW();
}

function skipEx(key,exId){
  if(isPast())return;
  if(!S.sessions[key])S.sessions[key]={};
  if(!S.sessions[key][exId])S.sessions[key][exId]={done:false,sets:[],skipped:false};
  S.sessions[key][exId].skipped=true;
  save();showToast("Exercise skipped");renderW();
  setTimeout(()=>{const b=document.getElementById("sb-"+exId);if(b)b.classList.add("open");const c=document.getElementById("chev-"+exId);if(c)c.classList.add("open");},20);
}

function addSet(key,exId){
  if(isPast())return;
  ensure(key,exId,0);
  S.sessions[key][exId].sets.push({});
  save();renderW();
  setTimeout(()=>{const b=document.getElementById("sb-"+exId);if(b)b.classList.add("open");const c=document.getElementById("chev-"+exId);if(c)c.classList.add("open");},20);
}

function reCard(key,exId){
  const prog=PROG[cDay];
  const ex=prog.exercises.find(e=>e.id===exId);
  if(!ex){renderW();return;}
  const sess=S.sessions[key]||{};
  const wasOpen=document.getElementById("sb-"+exId)?.classList.contains("open");
  const tmp=document.createElement("div");
  tmp.innerHTML=card(ex,sess,key);
  const old=document.getElementById("ex-"+exId);
  if(old){old.replaceWith(tmp.firstElementChild);}
  if(wasOpen){
    const b=document.getElementById("sb-"+exId);if(b)b.classList.add("open");
    const c=document.getElementById("chev-"+exId);if(c)c.classList.add("open");
    const cd=document.getElementById("ex-"+exId);
    if(cd&&!cd.classList.contains("done")&&!cd.classList.contains("skipped"))cd.classList.add("active-card");
  }
  const prog2=PROG[cDay];
  const total=prog2.exercises.length;
  const done=prog2.exercises.filter(e=>(S.sessions[key]||{})[e.id]?.done).length;
  const pct=total?Math.round((done/total)*100):0;
  const fill=document.querySelector(".prog-fill");if(fill)fill.style.width=pct+"%";
  const sub=document.querySelector(".pg-sub");if(sub)sub.textContent=`${prog2.sub} · ${done} of ${total} complete`;
}

function scoreEx(e,ql){
  const nameLow=e.name.toLowerCase();
  const catLow=e.cat.toLowerCase();
  const allText=[nameLow,catLow,...(e.muscles||[]),...(e.tags||[])].join(" ");
  if(nameLow===ql)return 100;
  if(nameLow.startsWith(ql))return 85;
  if(nameLow.includes(ql))return 70;
  if(catLow===ql)return 65;
  const tokens=ql.split(/\s+/).filter(Boolean);
  if(tokens.length>1){
    if(tokens.every(t=>nameLow.includes(t)))return 60;
    if(tokens.every(t=>allText.includes(t)))return 45;
    const matched=tokens.filter(t=>allText.includes(t)).length;
    if(matched>0)return Math.round(25*matched/tokens.length);
  }else{
    if(allText.includes(ql))return 40;
  }
  return 0;
}

function searchEx(q,day){
  const dd=document.getElementById("cfDD");
  if(!q||q.length<1){dd.classList.remove("show");dd.innerHTML="";return;}
  const ql=q.toLowerCase().trim();
  const d=esc(day||cDay);
  const results=EX_DB
    .map((e,i)=>({e,i,score:scoreEx(e,ql)}))
    .filter(x=>x.score>0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,8);
  if(!results.length){
    dd.innerHTML=`<div class="dd-item"><div class="dd-item-left"><div class="dd-name" style="color:var(--dim)">No matches — tap below to add "${esc(q)}" anyway</div></div><button class="dd-add-btn" data-action="freeform" data-day="${d}" data-q="${esc(q)}">Add</button></div>`;
    dd.dataset.r=JSON.stringify([]);dd.classList.add("show");return;
  }
  dd.innerHTML=results.map(({e},idx)=>`<div class="dd-item">
    <div class="dd-item-left">
      <div class="dd-name">${esc(e.name)}</div>
      <div class="dd-cat">${esc(e.cat)}${e.muscles?.length?" · "+esc(e.muscles.slice(0,2).join(", ")):""}</div>
    </div>
    <button class="dd-add-btn" data-action="fromdb" data-idx="${idx}" data-day="${d}">+</button>
  </div>`).join("");
  dd.dataset.r=JSON.stringify(results.map(({e})=>e));dd.classList.add("show");
}

function addFromDB(i,day){

  document.getElementById("cfDD").classList.remove("show");

function startSess(){

function stopSess(){
  if(!confirm("Stop workout and save session?"))return;
  workoutOn=false;clearInterval(sessTimer);
  const el=Math.floor((Date.now()-sessStart)/1000);
  const m=Math.floor(el/60),s=el%60;
  const key=sk(cDay);
  const prog=PROG[cDay];
  const setsDone=prog.exercises.reduce((a,ex)=>a+((S.sessions[key]||{})[ex.id]?.sets?.filter(s=>s.done)?.length||0),0);
  document.getElementById("sumDur").textContent=m+"m "+(s<10?"0":"")+s+"s";
  document.getElementById("sumSets").textContent=setsDone;
  document.getElementById("sum").classList.add("show");
  if(navigator.vibrate)navigator.vibrate([80,40,160]);
  sessStart=null;
}

async function aiRun(type){
  let prompt="",outId="";
  if(type==="conv"){
    const v=document.getElementById("ci").value.trim();if(!v)return;
    prompt="Convert this workout note into compact structure (Exercise → Sets × Reps @ Weight, max 3 lines): "+v;
    outId="co";
  }else if(type==="overload"){
    const v=document.getElementById("oi").value.trim();if(!v)return;
    prompt="Last session: "+v+"\n\nGive today's exact progressive overload targets in 4 lines max.";
    outId="oo";
  }else if(type==="sub"){
    const v=document.getElementById("si").value.trim();if(!v)return;
    prompt=`Machine busy request: ${v}. Gym equipment: ${GYM}. Give 3 ranked safe alternatives, one sentence each.`;
    outId="so";
  }else{
    prompt=`Recovery decision request. CPAP: ${document.getElementById("sl").value||"?"}/100 Energy: ${document.getElementById("en").value||"?"}/10 Soreness: ${document.getElementById("sr").value||"?"}/10 Calf: ${document.getElementById("cp").value}. Give: Full / 80% / Light.`;
    outId="ro";
  }
  const out=document.getElementById(outId);
  out.className="ai-out show";
  out.innerHTML='<span class="spin"></span>Thinking...';
  try{
    const r=await fetch(API_CFG.baseUrl+"/api/coach",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_CFG.token},body:JSON.stringify({prompt,context:{day:cDay,program:PROG[cDay]?.title||""}})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||"Request failed");
    out.textContent=d.text||"No response.";
  }catch(e){out.textContent="AI unavailable. Check backend server/token.";}
}

      <div class="st-row" onclick="clearD()"><div class="st-icon">🗑</div><div class="st-info"><div class="st-ttl" style="color:var(--red)">Clear All Data</div><div class="st-sub">Wipe all sessions and history</div></div></div>
    </div>
    <div style="height:20px"></div>
  </div>`;
}

function genExp(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-91);
  const lines=["=== FORGE EXPORT — Last 3 Months ===","Generated: "+new Date().toLocaleString(),"","SESSIONS:"];
  const sorted=Object.keys(S.sessions).sort();
  for(const key of sorted){
    const m=key.match(/_(\d{4})W(\d+)$/);
    if(m){const yr=+m[1],wn=+m[2],jan1=new Date(yr,0,1),dow=jan1.getDay()||7,mon=new Date(yr,0,1+(wn-1)*7-(dow-1));if(mon<cutoff)continue;}
    const data=S.sessions[key];
    const hasData=Object.values(data).some(e=>(e.sets||[]).some(s=>s.done)||e.done);
    if(!hasData)continue;
    lines.push("\n"+key+":");
    Object.entries(data).forEach(([id,ed])=>{
      const name=findN(id)||id;
      const sets=(ed.sets||[]).filter(s=>s.done).map(s=>`${s.weight||"—"}kg×${s.reps||"—"}`).join(", ");
      const skip=ed.skipped?"(skipped)":"";
      const card=ed.done&&!sets&&!skip?"(completed)":"";
      if(sets||skip||card)lines.push(`  ${name}: ${sets||skip||card}`);
    });
  }
  document.getElementById("expArea").value=lines.join("\n");
}

function copyExp(){
  const ta=document.getElementById("expArea");
  if(!ta.value)genExp();
  navigator.clipboard?.writeText(ta.value).then(()=>showToast("Copied — paste into Claude ✓")).catch(()=>{ta.select();document.execCommand("copy");showToast("Copied ✓");});
}

function findN(id){
  for(const day of Object.values(PROG)){const ex=day.exercises?.find(e=>e.id===id);if(ex)return ex.name;}
  return id;
}

function clearD(){if(confirm("Clear all data?")){localStorage.removeItem("f5");location.reload();}}

function resetPlan(){
  if(!confirm("Reset to the default program? Your session history is kept."))return;
  delete S.weekPlans;
  delete S.plan; // migration cleanup
  save();
  location.reload();
}

function buildWeekSummary(){
  const cur=wk();
  const summary={};
  for(const[day,dayData]of Object.entries(PROG)){
    const key=day+"_"+cur;
    const sessData=S.sessions[key];
    if(!sessData)continue;
    const exs=[];
    for(const ex of(dayData.exercises||[])){
      const ed=sessData[ex.id];
      if(!ed)continue;
      const setsDone=(ed.sets||[]).filter(s=>s.done).map(s=>({weight:s.weight,reps:s.reps}));
      if(setsDone.length||ed.done||ed.skipped){
        exs.push({id:ex.id,name:ex.name,target_sets:ex.sets,target_reps:ex.reps,current_hint:ex.hint,sets_logged:setsDone,completed:!!ed.done,skipped:!!ed.skipped});
      }
    }
    if(exs.length)summary[day]=exs;
  }
  return summary;
}

function buildPlanSnapshot(){
  const snap={};
  for(const[day,dayData]of Object.entries(PROG)){
    if(!dayData.exercises?.length)continue;
    snap[day]={label:dayData.label,exercises:dayData.exercises.map(ex=>({id:ex.id,name:ex.name,cat:ex.cat,sets:ex.sets,reps:ex.reps,hint:ex.hint,muscles:ex.muscles||[]}))};
  }
  return snap;
}

let _pendingPlan=null;

async function genWeeklyPlan(){
  const btn=document.getElementById("genPlanBtn");
  if(!btn)return;
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>Generating...';
  try{
    const r=await fetch(API_CFG.baseUrl+"/api/weekly-plan",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+API_CFG.token},
      body:JSON.stringify({
        weekSummary:buildWeekSummary(),
        profile:{equipment:GYM,currentPlan:buildPlanSnapshot()},
        rules:"Progressive overload: ONLY increase weight if completed=true AND sets_logged has actual weights. Skipped or unlogged → no change. You MAY add new exercises (action:'add') or remove stale ones (action:'remove') to add variety — swap a plateau exercise for a different movement hitting the same muscle group. For adds: provide id (e.g. 'ai_mon_cablerow'), name, cat, sets, reps, hint, cue, muscles array. Never touch physio (cat=physio) or cardio exercises. Max 4 gym exercises per body-part group per day. Each training day must cover exactly 2 distinct body-part groups."
      })
    });
    if(!r.ok)throw new Error("Request failed");
    const data=await r.json();
    let parsed;
    try{parsed=JSON.parse(data.text);}
    catch{const m=data.text?.match(/\{[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);else throw new Error("Invalid response");}
    _pendingPlan=parsed;
    showPlanModal(parsed);
  }catch(e){
    showToast("Failed to generate plan — try again");
  }finally{
    btn.disabled=false;
    btn.textContent="Generate Next Week";
  }
}

function showPlanModal(parsed){
  const modal=document.getElementById("planModal");
  const weekPlan=parsed.week_plan||{};
  const notes=parsed.coaching_notes||"";
  const flags=Array.isArray(parsed.flags)?parsed.flags:[];

  let changesHtml="";
  let changeCount=0;
  for(const[day,exercises]of Object.entries(weekPlan)){
    if(!Array.isArray(exercises)||!exercises.length||!PROG[day])continue;
    for(const upd of exercises){
      if(upd.action==="remove"){
        const cur=PROG[day].exercises.find(e=>e.id===upd.id);
        if(!cur)continue;
        changeCount++;
        changesHtml+=`<div class="pm-change"><div class="pm-change-day">${esc(day)}</div><div class="pm-change-ex" style="color:var(--red)">🗑 ${esc(cur.name)}</div><div class="pm-change-val" style="color:var(--red)">Removing</div></div>`;
      } else if(upd.action==="add"){
        changeCount++;
        changesHtml+=`<div class="pm-change"><div class="pm-change-day">${esc(day)}</div><div class="pm-change-ex" style="color:var(--green)">➕ ${esc(upd.name||upd.id)}</div><div class="pm-change-val" style="color:var(--green)">${upd.sets||""}×${upd.reps||""} · ${esc(upd.hint||"")}</div></div>`;
      } else {
        const cur=PROG[day].exercises.find(e=>e.id===upd.id);
        if(!cur)continue;
        const hintChanged=upd.hint!==undefined&&upd.hint!==cur.hint;
        const setsChanged=upd.sets!==undefined&&upd.sets!==cur.sets;
        const repsChanged=upd.reps!==undefined&&String(upd.reps)!==String(cur.reps);
        if(!hintChanged&&!setsChanged&&!repsChanged)continue;
        changeCount++;
        const from=[cur.hint,`${cur.sets}×${cur.reps}`].filter(Boolean).join(" · ");
        const to=[upd.hint||(hintChanged?"":cur.hint),(setsChanged||repsChanged)?`${upd.sets||cur.sets}×${upd.reps||cur.reps}`:null].filter(Boolean).join(" · ");
        changesHtml+=`<div class="pm-change"><div class="pm-change-day">${esc(day)}</div><div class="pm-change-ex">${esc(cur.name)}</div><div class="pm-change-val">${esc(from)} → ${esc(to)}</div></div>`;
      }
    }
  }

  modal.innerHTML=`
    <div class="pm-title">Next Week's Plan</div>
    <div class="pm-sub">Effective from week of ${esc(weekLabel(nextWk()))}. Review then apply.</div>
    ${notes?`<div class="pm-section">Coaching Notes</div><div class="pm-notes">${esc(notes)}</div>`:""}
    ${flags.length?`<div class="pm-section">Flags</div>${flags.map(f=>`<div class="pm-flag">${esc(f)}</div>`).join("")}`:""}
    <div class="pm-section">Changes${changeCount?` (${changeCount})`:""}</div>
    ${changesHtml||`<div class="pm-notes">No changes needed — program looks good for next week.</div>`}
    <div class="pm-btns">
      <button class="pm-cancel" onclick="closePlanModal()">Cancel</button>
      <button class="pm-apply" onclick="applyPendingPlan()">Apply Plan</button>
    </div>`;
  modal.classList.add("show");
}

function closePlanModal(){
  document.getElementById("planModal").classList.remove("show");
  _pendingPlan=null;
}

function applyPendingPlan(){
  if(!_pendingPlan?.week_plan){closePlanModal();return;}
  const nwk=nextWk();
  S.weekPlans=S.weekPlans||{};
  S.weekPlans[nwk]=S.weekPlans[nwk]||{};
  for(const[day,exercises]of Object.entries(_pendingPlan.week_plan)){
    if(!Array.isArray(exercises)||!PROG[day])continue;
    if(!S.weekPlans[nwk][day])S.weekPlans[nwk][day]=[];
    for(const upd of exercises){
      if(upd.action==="add"){
        // New exercise — store full definition
        const stored=S.weekPlans[nwk][day].find(e=>e.id===upd.id);
        if(stored)Object.assign(stored,upd);
        else S.weekPlans[nwk][day].push({...upd});
      } else if(upd.action==="remove"){
        // Store remove marker
        if(!S.weekPlans[nwk][day].find(e=>e.id===upd.id))
          S.weekPlans[nwk][day].push({action:"remove",id:upd.id});
      } else {
        // Standard update — only for exercises that exist in PROG
        const ex=PROG[day].exercises.find(e=>e.id===upd.id);
        if(!ex)continue;
        // Store only — do NOT mutate PROG now; applyPlanOverrides() applies it next week
        const stored=S.weekPlans[nwk][day].find(e=>e.id===upd.id);
        if(stored)Object.assign(stored,upd);
        else S.weekPlans[nwk][day].push({...upd});
      }
    }
  }
  save();
  closePlanModal();
  renderST();
  showToast("Plan saved for week of "+weekLabel(nwk)+" ✓");
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}
</script>
