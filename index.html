<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FORGE">
<meta name="theme-color" content="#0A0A0B">
<link rel="manifest" href="/manifest.json?v=2">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>FORGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Self-hosted display font — pre-cached by sw.js, renders fully offline */
@font-face{
  font-family:'Barlow Condensed';font-style:normal;font-weight:600;font-display:swap;
  src:url('/fonts/barlow-condensed-600.woff2') format('woff2');
}
@font-face{
  font-family:'Barlow Condensed';font-style:normal;font-weight:700;font-display:swap;
  src:url('/fonts/barlow-condensed-700.woff2') format('woff2');
}
:root{
  color-scheme: light dark; /* auto — light-dark() resolves against this */
  /* ── themed tokens · light = cool court gray · dark = deep cool near-black ── */
  --black:light-dark(#F4F4F5,#0A0A0B);
  --s0:light-dark(#FFFFFF,#101013);
  --s1:light-dark(#FFFFFF,#131316);
  --s2:light-dark(#F5F5F7,#1A1A1E);
  --s3:light-dark(#EBEBEE,#222228);
  --b1:light-dark(#E7E7EA,#222228);
  --b2:light-dark(#D5D5DB,#2F2F36);
  --dim:light-dark(#7C7C86,#73737E);
  --mid:light-dark(#55555E,#9EA0A8);
  --lt:light-dark(#34343C,#C9CAD1);
  --white:light-dark(#131316,#F4F4F1);
  /* volt accent system: --accent = fills · --accent-ink = text ON fills ·
     --accent-text = accent-coloured text/strokes on surfaces (moss in light —
     raw volt on white is 1.5:1, illegible) · --accent-lo = tint bg */
  --accent:light-dark(#B9E425,#C8F135);
  --accent-ink:#121403;
  --accent-text:light-dark(#55700B,#C8F135);
  /* Gradient fill for primary CTAs — flat --accent was reading as flat/cheap
     next to reference apps that gradient-fill everything. Subtle diagonal
     shift toward a deeper volt tone, not a hue change, so it still reads
     as "the accent color" not a different color. */
  --accent-grad:linear-gradient(135deg,light-dark(#C3EA30,#D4F55A),light-dark(#9FC71A,#A8D62C));
  --accent-lo:light-dark(#EDF4D3,#222B0E);
  --orange:var(--accent-text);
  --orange-lo:var(--accent-lo);
  --orange-mid:light-dark(#5F6E36,#B7C784);
  --on-accent:var(--accent-ink);
  --green:light-dark(#178A43,#3ECF77);
  --green-lo:light-dark(#E3F3E8,#0D2415);
  --red:light-dark(#D6453A,#F26257);
  --red-lo:light-dark(#FBEAE8,#2A1210);
  --amber:light-dark(#B8720E,#E8A33C);
  --amber-lo:light-dark(#FAF2DE,#262009);
  --blue:light-dark(#2E6FD8,#6FA2F2);
  --shadow:0 1px 2px light-dark(rgba(16,16,20,.05),rgba(0,0,0,.45)),0 6px 20px light-dark(rgba(16,16,20,.07),rgba(0,0,0,.4));
  --shadow-lift:0 2px 6px light-dark(rgba(16,16,20,.08),rgba(0,0,0,.55)),0 14px 36px light-dark(rgba(16,16,20,.12),rgba(0,0,0,.5));
  /* ── theme-independent tokens · heroes stay dark in BOTH themes ── */
  --font-display:'Barlow Condensed','Inter',sans-serif;
  /* Canonical "eyebrow label" style — the small uppercase section/field
     labels used throughout Settings, cards, and section headers. Was
     previously ~20 near-duplicate one-off values (9-12px, weight
     600/700/800, letter-spacing 1-3px); consolidated to one scale so
     labels read as one consistent system instead of ad hoc per component. */
  --fs-label:11px;
  --fw-label:700;
  --ls-label:1.5px;
  --grad-push:linear-gradient(150deg,#3A2226 0%,#22161A 55%,#120D0F 100%);
  --grad-pull:linear-gradient(150deg,#20283C 0%,#161B2A 55%,#0D0F16 100%);
  --grad-legs:linear-gradient(150deg,#2E2A3E 0%,#1D1A2B 55%,#100E17 100%);
  --grad-core:linear-gradient(150deg,#1F3028 0%,#15201B 55%,#0C110E 100%);
  --grad-rest:linear-gradient(150deg,#26262C 0%,#1A1A1F 55%,#0F0F12 100%);
  --grad-nut:linear-gradient(150deg,#272B1C 0%,#191C12 55%,#0E100A 100%);
  --hero-fg:#FFFFFF;
  --hero-fg-dim:rgba(255,255,255,.62);
  --hero-fg-faint:rgba(255,255,255,.4);
  --hero-chip:rgba(255,255,255,.12);
  --hero-line:rgba(255,255,255,.22);
  --hero-accent:#C8F135;
  --hero-pos:#BDF7CB;
  --hero-neg:#FFC9C2;
  --chart-p:#C8F135;--chart-c:#5EA0F2;--chart-f:#3EC97E;--chart-fi:#B08CF9;
}
html[data-theme="light"]{color-scheme:light;}
html[data-theme="dark"]{color-scheme:dark;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
/* Universal tactile press feedback — native buttons squish slightly on tap
   instead of only changing color/opacity. Composes with any more-specific
   :active rule below since it's a different property (transform). */
button{transition:transform .12s ease;}
button:active:not(:disabled){transform:scale(.96);}
.nav-item,.st-row,.dd-item{transition:transform .12s ease;}
.nav-item:active,.st-row:active,.dd-item:active{transform:scale(.97);}
html,body{height:100%;overflow:hidden;background:var(--black);}
body{font-family:'Inter',sans-serif;color:var(--white);max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100dvh;}

/* ── HEADER ── */
.hdr{padding:calc(16px + env(safe-area-inset-top,0px)) 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--black);}
.logo{font-family:'Inter',sans-serif;font-size:19px;font-weight:800;letter-spacing:4px;color:var(--white);text-transform:uppercase;}
.target-pill{background:var(--s1);border:1px solid var(--b1);border-radius:999px;padding:6px 14px;font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--mid);text-transform:uppercase;box-shadow:var(--shadow);}

/* ── IMMERSIVE DARK CARD TEXT ISOLATION ── */
/* Hero/quote/nut-hero gradients stay dark in BOTH themes — text inside must
   never inherit themed tokens (light mode would render it invisible). This
   guard comes FIRST so specific hero rules below override by cascade. */
.hero,.hero *,.quote-card,.quote-card *,.nut-hero,.nut-hero *{color:var(--hero-fg);}

/* ── QUOTE ── */
.quote{padding:6px 16px 10px;flex-shrink:0;background:var(--black);}
.quote-card>.quote-overlay{position:absolute!important;inset:0;padding:13px 16px;background:var(--grad-rest);border-radius:16px;z-index:2;transition:opacity .8s ease;}
.quote-card>.quote-overlay::after{content:"";position:absolute;inset:0;border-radius:16px;background:radial-gradient(120% 90% at 85% -10%,rgba(200,241,53,.10),transparent 55%);pointer-events:none;}
.quote-card{background:var(--grad-rest);border:none;border-top:1px solid rgba(200,241,53,.18);border-radius:16px;padding:13px 16px;position:relative;overflow:hidden;box-shadow:var(--shadow-lift);}
.quote-card::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 85% -10%,rgba(200,241,53,.10),transparent 55%);pointer-events:none;}
.quote-card>*{position:relative;z-index:1;}
.quote-icon{display:none;}
.quote-body{display:block;font-size:13px;font-weight:600;color:var(--hero-fg);line-height:1.45;letter-spacing:0.1px;}
.quote-author{display:block;font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--hero-fg-dim);margin-top:5px;}

/* ── DAY NAV (date strip) ── */
.days{display:flex;gap:4px;padding:10px 16px 14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:var(--black);}
.days::-webkit-scrollbar{display:none;}
.day-btn{flex:1 0 auto;min-width:46px;padding:8px 6px 9px;border-radius:14px;font-size:11px;font-weight:500;letter-spacing:0.2px;border:1px solid transparent;color:var(--dim);background:transparent;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.day-btn.today{color:var(--mid);}
.day-btn.today::after{content:"";width:4px;height:4px;border-radius:50%;background:var(--orange);margin-top:1px;}
.day-btn.active{background:var(--white);border-color:var(--white);color:var(--black);font-weight:700;box-shadow:var(--shadow);}
.day-date{font-size:15px;font-weight:700;letter-spacing:0;text-transform:none;opacity:1;}
.wk-nav{display:flex;align-items:center;padding:8px 18px 6px;gap:8px;}
.wk-nav-btn{background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--mid);cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s;}
.wk-nav-btn:disabled{opacity:0.25;cursor:default;}
.wk-nav-lbl{flex:1;font-size:12px;color:var(--mid);text-align:center;line-height:1.5;}
.wk-nav-cur{font-size:10px;color:var(--green);display:block;}
.wk-nav-back{font-size:10px;color:var(--orange);display:block;cursor:pointer;text-decoration:underline;}
.past-banner{margin:0 18px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--b2);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--dim);text-align:center;}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:104px;overscroll-behavior-y:contain;}
.ptr{position:fixed;top:0;left:50%;transform:translate(-50%,-48px);width:36px;height:36px;border-radius:50%;background:var(--s1);box-shadow:var(--shadow-lift);display:flex;align-items:center;justify-content:center;z-index:60;transition:transform .2s ease;pointer-events:none;}
.ptr svg{width:18px;height:18px;stroke:var(--white);fill:none;stroke-width:2.2;stroke-linecap:round;}
.ptr.spin svg{animation:ptrSpin .8s linear infinite;}
@keyframes ptrSpin{to{transform:rotate(360deg)}}

/* ── PAGE HEADER ── */
.pg{padding:18px 18px 0;}
.pg-title{font-family:var(--font-display);font-size:36px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--white);line-height:1.02;}
.pg-title span{color:var(--orange);}
.pg-sub{font-size:13px;color:var(--dim);margin-top:5px;letter-spacing:0.1px;}

/* ── HERO (gradient day card) ── */
.hero{margin:6px 16px 4px;border-radius:22px;padding:22px 20px 18px;border-top:1px solid rgba(200,241,53,.28);position:relative;overflow:hidden;box-shadow:var(--shadow-lift);}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 85% -10%,rgba(200,241,53,.14),transparent 55%),radial-gradient(100% 70% at 15% 110%,rgba(255,255,255,.06),transparent 60%);pointer-events:none;}
.hero-push{background:var(--grad-push);}
.hero-pull{background:var(--grad-pull);}
.hero-legs{background:var(--grad-legs);}
.hero-rest{background:var(--grad-rest);}
.hero-core{background:var(--grad-core);}
.hero-kicker{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--hero-fg-dim);margin-bottom:6px;}
.hero-title{font-family:var(--font-display);font-size:40px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;line-height:1.0;}
.hero-sub{font-size:13px;color:var(--hero-fg-dim);margin-top:6px;font-weight:500;}
.hero-prog{margin-top:16px;height:5px;background:var(--hero-line);border-radius:99px;overflow:hidden;}
.hero-prog-fill{height:100%;background:var(--hero-accent);border-radius:99px;transition:width .5s ease;}
.hero-count{font-size:11px;font-weight:600;color:var(--hero-fg-dim);margin-top:7px;}
.hero-streak{font-size:11px;font-weight:600;margin-top:4px;color:var(--hero-accent);}
.pr-badge{font-size:10px;font-weight:600;color:var(--accent-text);margin-top:3px;}

/* ── PROGRESS ── */
.prog-wrap{margin:14px 18px 0;height:3px;background:var(--b1);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--orange);border-radius:99px;transition:width .5s ease;}

/* ── SESSION BAR ── */
.session-bar{margin:14px 16px;display:flex;gap:10px;}
.btn-start{flex:1;padding:16px;background:var(--accent-grad);border:none;border-radius:999px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;color:var(--accent-ink);cursor:pointer;text-transform:uppercase;transition:opacity .15s,transform .12s ease;box-shadow:var(--shadow);}
.btn-start:active{opacity:.8;}
.btn-stop{flex:1;padding:16px;background:transparent;border:1.5px solid var(--red);border-radius:999px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;color:var(--red);cursor:pointer;text-transform:uppercase;display:none;}
.btn-stop.show{display:block;}
.btn-start.hide{display:none;}
.sess-complete{flex:1;padding:16px;background:var(--green-lo);border:none;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--green);text-align:center;text-transform:uppercase;}

/* ── SECTION LABEL ── */
.sec{padding:20px 20px 10px;font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--mid);text-transform:uppercase;display:flex;align-items:center;gap:8px;}

/* ── EXERCISE CARD ── */
.ex-card{
  margin:0 16px 10px;
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:18px;
  overflow:hidden;
  box-shadow:var(--shadow);
  transition:border-color .25s, box-shadow .25s;
}
.ex-card.active-card{
  border-color:var(--orange);
  box-shadow:var(--shadow-lift);
}
.ex-card.done{border-color:transparent;background:var(--green-lo);box-shadow:none;}
.ex-card.skipped{opacity:.45;}

.ex-top{display:flex;align-items:center;padding:15px 15px;gap:12px;cursor:pointer;}
.ex-icon{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ex-icon.gym{background:var(--orange-lo);}
.ex-icon.physio{background:var(--green-lo);}
.ex-icon.cardio{background:var(--amber-lo);}

.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:600;letter-spacing:-0.2px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-card.done .ex-name{color:var(--dim);}
.ex-meta{font-size:11px;color:var(--dim);margin-top:3px;}

.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.watch-chip{background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:500;color:var(--mid);text-decoration:none;white-space:nowrap;}
.ex-chev{color:var(--b2);font-size:16px;transition:transform .2s;}
.ex-chev.open{transform:rotate(180deg);}

/* ── SETS BODY ── */
.sets-body{display:none;border-top:1px solid var(--b1);}
.sets-body.open{display:block;}

.cue-box{margin:12px 14px 10px;padding:10px 13px;border-left:2px solid var(--orange);background:var(--orange-lo);border-radius:0 6px 6px 0;font-size:12px;color:var(--orange-mid);line-height:1.6;}

.action-row{display:flex;gap:8px;padding:0 14px 10px;}
.skip-btn{background:transparent;border:1px solid var(--b2);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:500;color:var(--dim);cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.3px;}
.skip-btn:active{border-color:var(--mid);color:var(--lt);}

/* ── SET ROWS ── */
.sets-wrap{padding:0 14px 4px;}
.set-hdr{display:grid;grid-template-columns:42px 1fr 16px 1fr 44px;gap:6px;padding:0 2px 6px;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;text-align:center;}
.unit-chip{background:transparent;border:1px solid var(--b1);border-radius:6px;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--dim);padding:2px 5px;cursor:default;text-transform:uppercase;}
.unit-chip.tappable{cursor:pointer;border-color:var(--orange);color:var(--orange);}
.unit-chip.tappable:active{background:var(--orange-lo);}

.set-row{
  display:grid;grid-template-columns:42px 1fr 16px 1fr 44px;
  gap:6px;align-items:center;min-height:54px;
  background:var(--s2);border-radius:14px;padding:0 10px;
  margin-bottom:7px;border:1px solid transparent;transition:all .2s;
}
.set-row.done{background:var(--green-lo);}
.set-row.needs-input{border-color:var(--amber);}

.sn{font-size:12px;font-weight:600;color:var(--dim);text-align:center;}
.set-row.done .sn{color:var(--green);}

.si{width:100%;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:20px;font-weight:700;color:var(--white);text-align:center;-webkit-appearance:none;}
.si::placeholder{color:var(--b2);font-size:14px;font-weight:400;}
.set-row.done .si{color:var(--mid);}
.sx{font-size:12px;color:var(--dim);text-align:center;}

.sdone{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);transition:all .15s;flex-shrink:0;margin:0 auto;}
.sdone.done{background:var(--green);border-color:var(--green);color:#fff;}
.sdone.locked{opacity:.3;cursor:not-allowed;}

/* Cardio */
.cardio-row{display:flex;align-items:center;justify-content:space-between;min-height:54px;background:var(--s2);border-radius:8px;padding:0 14px;margin-bottom:6px;border:1px solid transparent;cursor:pointer;transition:all .2s;}
.cardio-row.done{background:var(--green-lo);border-color:var(--green);}
.cardio-dur{font-size:18px;font-weight:600;letter-spacing:-0.3px;}
.cardio-row.done .cardio-dur{color:var(--green);}
.cardio-chk{width:36px;height:36px;border-radius:6px;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);transition:all .2s;}
.cardio-row.done .cardio-chk{background:var(--green);border-color:var(--green);color:var(--s1);}

.add-set-btn{width:100%;border:1px dashed var(--b2);border-radius:8px;padding:9px;font-size:12px;font-weight:500;color:var(--dim);background:transparent;cursor:pointer;font-family:'Inter',sans-serif;margin-top:2px;margin-bottom:10px;transition:all .15s;}
.add-set-btn:active{border-color:var(--orange);color:var(--orange);}

/* ── CUSTOM EX ── */
.custom-wrap{margin:0 18px 12px;}
.custom-trigger{width:100%;padding:12px;border:1px dashed var(--b2);border-radius:8px;background:transparent;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--dim);text-transform:uppercase;transition:all .15s;}
.custom-trigger:active{border-color:var(--orange);color:var(--orange);}

.custom-form{display:none;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-top:8px;}
.custom-form.open{display:block;}
.cf-label{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--dim);text-transform:uppercase;display:block;margin-bottom:5px;}
.search-wrap{position:relative;margin-bottom:12px;}
.cf-inp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:11px 13px;font-family:'Inter',sans-serif;font-size:14px;color:var(--white);outline:none;-webkit-appearance:none;}
.cf-inp:focus{border-color:var(--orange);}
.cf-inp::placeholder{color:var(--dim);}
.search-dd{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--s2);border:1px solid var(--orange);border-top:none;border-radius:0 0 10px 10px;max-height:340px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.6);}
.search-dd.show{display:block;}
.dd-item{padding:13px 14px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:1px solid var(--b1);transition:background .1s;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dd-item:last-child{border:none;}
.dd-item:active{background:var(--s3);}
.dd-item-left{flex:1;}
.dd-name{font-size:14px;font-weight:500;}
.dd-cat{font-size:11px;color:var(--dim);margin-top:3px;}
.dd-warn{font-size:11px;color:var(--amber);margin-top:3px;font-weight:600;}
.dd-alt-btn{background:transparent;border:1px solid var(--amber);color:var(--amber);}
.dd-add-btn{background:var(--accent);border:none;border-radius:6px;padding:6px 12px;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--accent-ink);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.num-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.cf-num{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:11px;font-family:'Inter',sans-serif;font-size:18px;font-weight:700;color:var(--white);outline:none;text-align:center;-webkit-appearance:none;}
.cf-num:focus{border-color:var(--orange);}
.cf-num::placeholder{color:var(--dim);font-size:13px;font-weight:400;}

/* ── AI ── */

.ai-out{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px 13px;font-size:12px;color:var(--mid);line-height:1.7;white-space:pre-wrap;display:none;}

.ai-lbl{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--dim);text-transform:uppercase;display:block;margin-bottom:5px;}

/* ── SETTINGS ── */
.st-wrap{padding:18px;}
.st-pg-title{font-family:var(--font-display);font-size:32px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}

.st-pg-sub{font-size:12px;color:var(--dim);margin-bottom:18px;}
.st-sec{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--dim);text-transform:uppercase;margin:16px 0 8px;}

.export-title{font-size:15px;font-weight:700;margin-bottom:4px;}

.btn-row{display:flex;gap:8px;margin-bottom:10px;}
.btn-o{flex:1;padding:12px;background:var(--accent-grad);border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.5px;color:var(--accent-ink);cursor:pointer;}
.btn-g{flex:1;padding:12px;background:transparent;border:1px solid var(--b2);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.5px;color:var(--mid);cursor:pointer;}

/* ── BOTTOM NAV ── */

.ai-chat-send{flex-shrink:0;padding:10px 16px;background:var(--white);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:var(--black);cursor:pointer;white-space:nowrap;}
.ai-chat-send:disabled{opacity:.45;cursor:default;}
.ai-accordion{margin-top:10px;border:1px solid var(--b1);border-radius:12px;overflow:hidden;}.ai-accordion summary{padding:14px;font-size:13px;font-weight:700;color:var(--mid);cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;}.ai-accordion summary::-webkit-details-marker{display:none;}.ai-accordion[open] summary{border-bottom:1px solid var(--b1);}.ai-acc-inner{padding:12px;}.weekly-note{background:var(--s2);border-left:2px solid var(--orange);border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:10px;font-size:12px;color:var(--lt);line-height:1.7;}.weekly-note-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--orange);text-transform:uppercase;margin-bottom:5px;}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:flex-end;justify-content:center;}.modal-overlay.show{display:flex;}.modal-box{background:var(--s1);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}.modal-title{font-size:17px;font-weight:700;}.modal-sub{font-size:12px;color:var(--dim);margin-bottom:16px;line-height:1.6;}.modal-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;}.modal-step-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--accent-ink);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}.modal-step-text{font-size:13px;color:var(--lt);line-height:1.65;}.modal-url{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:10px 12px;font-family:monospace;font-size:11px;color:var(--mid);word-break:break-all;margin-bottom:14px;}.modal-btns{display:flex;gap:8px;margin-top:16px;}.modal-copy{flex:1;padding:13px;background:var(--accent-grad);border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:var(--accent-ink);cursor:pointer;}.modal-close-btn{padding:13px 18px;background:transparent;border:1px solid var(--b2);border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;color:var(--dim);cursor:pointer;}

/* ── NUTRITION v2 ── */
.nut-wrap{padding:16px 16px 24px;}
.nut-head{display:flex;justify-content:space-between;align-items:flex-end;margin:2px 4px 18px;}
.nut-kicker{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--dim);text-transform:uppercase;margin-bottom:3px;}
.nut-title{font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--white);line-height:1.02;}
.nut-nav-btns{display:flex;gap:8px;}
.nut-nav-btns button{width:38px;height:38px;border-radius:50%;background:var(--s1);border:1px solid var(--b1);color:var(--mid);font-family:'Inter',sans-serif;font-size:18px;cursor:pointer;box-shadow:var(--shadow);}
.nut-card{border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.nut-card-title{font-weight:800;letter-spacing:1.8px;}
.burn-val{font-family:var(--font-display);font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;}
.nut-hero{background:var(--grad-nut);border:none;border-top:1px solid rgba(200,241,53,.28);color:var(--hero-fg);box-shadow:var(--shadow-lift);position:relative;overflow:hidden;}
.nut-hero::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 85% -10%,rgba(200,241,53,.14),transparent 55%),radial-gradient(100% 70% at 15% 110%,rgba(255,255,255,.06),transparent 60%);pointer-events:none;}
.nut-hero>*{position:relative;z-index:1;}
.nut-hero .nut-card-title{color:var(--hero-fg-dim);}
.nut-hero .target-num{color:var(--hero-fg);font-family:var(--font-display);font-size:44px;font-weight:700;font-variant-numeric:tabular-nums;}
.nut-hero .target-num span{color:var(--hero-fg-dim)!important;}
.nut-hero .target-pill-g{background:var(--hero-chip)!important;color:var(--hero-fg)!important;}
.nut-hero .prog-bar-wrap{background:var(--hero-line);}
.nut-hero .prog-bar-fill{background:var(--hero-accent);}
.nut-hero .consumed-line{color:var(--hero-fg-dim)!important;}
.nut-hero .macro-chip{background:var(--hero-chip);}
.nut-hero .macro-val{color:var(--hero-fg);}
.nut-hero .macro-val span{color:var(--hero-fg-dim)!important;}
.nut-hero .macro-lbl{color:var(--hero-fg-dim);}
.nut-hero .net-line.net-green{color:var(--hero-pos);}
.nut-hero .net-line.net-red{color:var(--hero-neg);}
.nut-hero .shock-btn{border-color:var(--hero-fg-dim);color:var(--hero-fg);}
.nut-hero .shock-btn.active{background:var(--hero-chip);}
.nut-ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:128px;height:128px;margin:2px auto 8px;}
.nut-ring-text{position:absolute;text-align:center;}
.nut-ring-big{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--hero-fg);line-height:1;font-variant-numeric:tabular-nums;}
.nut-ring-small{font-size:11px;color:var(--hero-fg-dim);margin-top:3px;}
.nut-ring-fill{transition:stroke-dashoffset .6s ease;}
.nut-hero .food-item{border-color:var(--hero-line);}
.nut-hero .food-name{color:var(--hero-fg);}
.nut-hero .food-name span{color:var(--hero-fg-faint)!important;}
.nut-hero .food-macros{color:var(--hero-fg-dim);}
.nut-hero .food-kcal{color:var(--hero-fg);}
.nut-hero .food-del{color:var(--hero-neg);border-color:var(--hero-fg-faint);}
.nut-hero .add-food-btn{border-color:var(--hero-fg-faint);color:var(--hero-fg);}
.nut-hero .food-ta{background:var(--hero-chip);border-color:var(--hero-fg-faint);color:var(--hero-fg);}
.nut-hero .food-ta::placeholder{color:var(--hero-fg-dim);}
.nut-hero .food-cancel{color:var(--hero-fg);border-color:var(--hero-fg-faint);}
.nut-hero .food-submit{background:var(--accent-grad);color:var(--accent-ink);}
.nut-hero .pending-food{background:rgba(0,0,0,.2);border-color:var(--hero-fg-faint);}
.nut-hero .pending-macros{color:var(--hero-fg-dim);}
.nut-hero .pf-redo{color:var(--hero-fg);border-color:var(--hero-fg-faint);}
.nut-hero .ai-out{background:rgba(0,0,0,.2);border-color:var(--hero-line);color:var(--hero-fg);}

/* ── MACRO PIE ── */
.mpie-wrap{display:flex;align-items:center;gap:16px;margin:12px 0 10px;}
.mpie-donut{width:72px;height:72px;border-radius:50%;flex-shrink:0;position:relative;}
.mpie-hole{position:absolute;inset:16px;border-radius:50%;background:var(--s1);}
.nut-hero .mpie-hole{background:rgba(14,16,10,.85);}
.mpie-legend{flex:1;display:flex;flex-direction:column;gap:7px;}
.mpie-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mid);}
.mpie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mpie-val{margin-left:auto;font-size:11px;font-weight:600;color:var(--dim);}
.nut-hero .mpie-row{color:var(--hero-fg-dim);}
.nut-hero .mpie-val{color:var(--hero-fg-faint);}

/* ── SETTINGS v3 — accordion groups ── */
.st-acc{border-radius:18px;box-shadow:var(--shadow);background:var(--s1);border:1px solid var(--b1);margin-bottom:12px;overflow:hidden;}
.st-acc>summary{padding:16px;font-size:14px;font-weight:700;color:var(--white);cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.st-acc>summary::-webkit-details-marker{display:none;}
.st-acc>summary::after{content:"›";font-size:20px;color:var(--dim);transition:transform .2s;line-height:1;}
.st-acc[open]>summary::after{transform:rotate(90deg);}
.st-acc>summary .st-acc-sub{font-size:11px;font-weight:400;color:var(--dim);margin-top:1px;}
.st-acc-inner{padding:0 16px 16px;border-top:1px solid var(--b1);}
/* duplicate .st-sec removed 2026-07 — was silently dropping text-transform:uppercase
   from the rule above and drifting the size/weight/color out of sync (see canonical
   definition above). All shared properties now live in the one rule above; this
   selector previously existed only to declare margin, which is unified there now. */
.st-sec:first-child{margin-top:14px;}
.st-subacc{border-radius:14px;background:var(--s2);border:1px solid var(--b1);margin:0 0 14px;overflow:hidden;}
.st-subacc>summary{padding:13px 14px;font-size:13px;font-weight:700;color:var(--white);cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.st-subacc>summary::-webkit-details-marker{display:none;}
.st-subacc>summary::after{content:"›";font-size:17px;color:var(--dim);transition:transform .2s;line-height:1;}
.st-subacc[open]>summary::after{transform:rotate(90deg);}
.st-subacc>summary .st-subacc-note{font-size:11px;font-weight:400;color:var(--dim);margin-top:1px;}
.st-subacc-inner{padding:0 0 12px;border-top:1px solid var(--b1);}
.st-subacc .st-group{margin:12px 12px 0;}
.st-subacc .st-sec{margin:14px 12px 6px;}
.st-subacc .st-sec:first-of-type{margin-top:14px;}
.danger-zone{margin:16px 12px 0;border-radius:14px;border:1.5px solid var(--red);overflow:hidden;}
.danger-zone .st-sec{margin:0;padding:10px 14px;color:var(--red);border-bottom:1px solid var(--red);background:var(--red-lo);}
.danger-zone .st-group{margin:0;border-radius:0;box-shadow:none;border:none;}
.export-card{border-radius:18px;border:1px solid var(--b1);border-left:1px solid var(--b1);padding:18px;box-shadow:var(--shadow);}
.rule-item{border-radius:14px;border-left:3px solid var(--red);box-shadow:var(--shadow);}
.st-group{border-radius:18px;box-shadow:var(--shadow);}
.weekly-note{border-radius:12px;border-left:3px solid var(--orange);}

/* Accent buttons: readable text on graphite (light) / off-white (dark) */
.ai-btn,.btn-o,.food-submit,.wt-save,.modal-copy,.cf-add,.sum-close,.lock-btn,.dd-add-btn{color:var(--on-accent);}

.burn-inp{width:74px;background:var(--s2);border:1.5px solid var(--orange);border-radius:10px;padding:6px 4px;font-family:'Inter',sans-serif;font-size:18px;font-weight:700;color:var(--white);text-align:center;outline:none;-webkit-appearance:none;}

.plan-nudge{margin:0 16px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:var(--shadow);}
.plan-nudge-ttl{font-size:14px;font-weight:700;}
.plan-nudge-sub{font-size:11px;color:var(--dim);margin-top:2px;}

/* ── HAMBURGER DRAWER ── */
.hdr-burger{background:transparent;border:none;color:var(--white);font-size:22px;cursor:pointer;padding:4px 2px 4px 12px;line-height:1;}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s ease;}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:86%;max-width:330px;background:var(--black);z-index:201;transform:translateX(102%);transition:transform .28s cubic-bezier(.3,.7,.3,1);overflow-y:auto;padding:18px 16px 40px;box-shadow:-12px 0 40px rgba(0,0,0,.4);}
.drawer.open{transform:translateX(0);}
.drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.drawer-title{font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.drawer-close{background:var(--s1);border:1px solid var(--b1);border-radius:50%;width:34px;height:34px;color:var(--mid);font-size:16px;cursor:pointer;}
.trend-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
.trend-title{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--dim);text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.trend-legend{font-size:9px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--dim);}
.tbars{display:flex;align-items:flex-end;gap:6px;height:64px;}
.tbar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.tbar{width:100%;border-radius:4px 4px 2px 2px;background:var(--b2);min-height:2px;transition:height .3s ease;}
.tbar-lbl{font-size:8px;color:var(--dim);margin-top:4px;letter-spacing:0.5px;}
.tbar-lbl.today{color:var(--orange);font-weight:700;}
.tbar-val{font-size:8px;color:var(--dim);margin-bottom:2px;white-space:nowrap;}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--b2);margin-left:8px;vertical-align:middle;transition:background .3s;}
.sync-dot.on{background:var(--green);}
.sync-dot.off{background:var(--b2);}
.sync-dot.err{background:var(--red);}

/* ── PAST-DAY LOCK ── */
.lock-banner{display:flex;align-items:center;justify-content:center;gap:10px;}
.edit-pill{background:var(--s1);border:1px solid var(--b1);border-radius:50%;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;box-shadow:var(--shadow);padding:0;}

/* ── LOCK SCREEN ── */
.lock-screen{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;max-width:430px;margin:0 auto;}
.lock-logo{font-size:26px;font-weight:700;letter-spacing:8px;color:var(--orange);text-transform:uppercase;margin-bottom:6px;}
.lock-sub{font-size:12px;color:var(--dim);letter-spacing:0.5px;margin-bottom:44px;text-align:center;line-height:1.6;}
.lock-input{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:15px 16px;font-size:14px;color:var(--white);font-family:inherit;outline:none;margin-bottom:12px;}
.lock-input:focus{border-color:var(--orange);}
.lock-btn{width:100%;background:var(--accent-grad);color:var(--accent-ink);border:none;border-radius:10px;padding:15px;font-size:13px;font-weight:700;font-family:inherit;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:4px;}
.lock-err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:16px;}

/* ── PLAN MODAL — matches app card theme exactly ── */
.plan-modal{
  display:none;position:fixed;inset:0;z-index:1000;overflow-y:auto;box-sizing:border-box;
  background:var(--black);
  padding:calc(env(safe-area-inset-top,0px) + 76px) 20px 60px;
}
.plan-modal.show{display:block;}
.pm-title{font-family:var(--font-display);font-size:32px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--white);margin-bottom:4px;}
.pm-sub{font-size:12px;color:var(--mid);margin-bottom:20px;line-height:1.6;}
.pm-section{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--accent-text);text-transform:uppercase;margin:18px 0 8px;}
.pm-notes{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--accent-text);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;color:var(--lt);line-height:1.7;margin-bottom:6px;}
.pm-flag{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--accent-text);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--mid);line-height:1.5;margin-bottom:6px;}
.pm-change{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;margin-bottom:6px;}
.pm-change-reason{font-size:11px;color:var(--dim);margin-top:4px;font-style:italic;}
.pm-change-day{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--accent-text);text-transform:uppercase;margin-bottom:3px;}
.pm-change-ex{font-size:14px;font-weight:700;color:var(--white);}
.pm-change-val{font-size:12px;color:var(--lt);margin-top:3px;font-weight:600;}
.pm-btns{display:flex;gap:10px;margin-top:24px;}
.pm-apply{flex:1;padding:15px;background:var(--accent-grad);border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--accent-ink);cursor:pointer;text-transform:uppercase;}
.pm-cancel{flex:1;padding:15px;background:transparent;border:1px solid var(--b2);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--mid);cursor:pointer;}

/* ── REST TIMER ── */
.rest-timer{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);max-width:300px;width:90%;background:var(--s1);border:2px solid var(--accent-text);border-radius:16px;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 24px;cursor:pointer;box-shadow:var(--shadow-lift);}
.rt-label{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--orange);text-transform:uppercase;margin-bottom:4px;}
.rt-count{font-family:var(--font-display);font-size:64px;font-weight:700;color:var(--orange);letter-spacing:.5px;line-height:1;font-variant-numeric:tabular-nums;}
.rt-skip{font-size:11px;color:var(--dim);margin-top:6px;letter-spacing:0.5px;}

/* ── OVERLOAD BADGES ── */
.ol-up{display:inline-block;background:var(--green-lo);color:var(--green);border:1px solid var(--green);border-radius:4px;font-size:10px;font-weight:700;padding:1px 5px;margin-left:6px;vertical-align:middle;}
.ol-down{display:inline-block;background:var(--red-lo);color:var(--red);border:1px solid var(--red);border-radius:4px;font-size:10px;font-weight:700;padding:1px 5px;margin-left:6px;vertical-align:middle;}
.ol-eq{display:inline-block;background:var(--s2);color:var(--dim);border:1px solid var(--b2);border-radius:4px;font-size:10px;font-weight:700;padding:1px 5px;margin-left:6px;vertical-align:middle;}

/* ── LAST GHOST ── */
.last-ghost{font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:0.2px;}
.export-sheet{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.export-sheet.open{opacity:1;pointer-events:all;}
.export-sheet-inner{background:var(--s1);border-radius:18px 18px 0 0;padding:20px 16px 32px;width:100%;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.export-sheet.open .export-sheet-inner{transform:translateY(0);}
.export-sheet-title{font-size:14px;font-weight:700;color:var(--dim);text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px;}
.export-opt{display:flex;flex-direction:column;align-items:flex-start;width:100%;background:var(--b2);border:none;border-radius:12px;padding:14px 16px;margin-bottom:10px;color:var(--white);font-size:15px;font-weight:600;cursor:pointer;text-align:left;}
.export-opt-sub{font-size:11px;font-weight:400;color:var(--dim);margin-top:3px;}
.export-cancel{width:100%;background:none;border:none;padding:12px;color:var(--dim);font-size:15px;cursor:pointer;}

/* ── CALF BUTTON ── */
.calf-btn{padding:8px 14px;background:transparent;border:1px solid var(--orange);border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--orange);cursor:pointer;white-space:nowrap;position:relative;transition:all .15s;}
.calf-btn:active{background:var(--orange-lo);}
.calf-btn.calf-warn{border-color:var(--red);color:var(--red);}
.calf-badge{display:inline-block;background:var(--accent);color:var(--accent-ink);border-radius:99px;font-size:9px;font-weight:700;min-width:16px;height:16px;line-height:16px;text-align:center;padding:0 4px;margin-left:5px;vertical-align:middle;}
.calf-btn.calf-warn .calf-badge{background:var(--red);}

/* ── VOLUME BARS ── */
.vol-bar-wrap{background:var(--s2);border-radius:99px;height:6px;flex:1;overflow:hidden;margin-left:8px;}
.vol-bar{height:100%;background:var(--orange);border-radius:99px;transition:width .4s;}
.vol-row{display:flex;align-items:center;padding:5px 0;font-size:12px;color:var(--lt);}
.vol-muscle{min-width:90px;color:var(--mid);text-transform:capitalize;}
.vol-count{font-size:11px;color:var(--dim);margin-left:8px;min-width:42px;text-align:right;}

/* ── SESSION NOTES ── */
.notes-area{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px 13px;font-family:'Inter',sans-serif;font-size:13px;color:var(--lt);outline:none;resize:vertical;min-height:80px;box-sizing:border-box;margin:0 0 12px;}
.notes-area:focus{border-color:var(--orange);}
.notes-area::placeholder{color:var(--dim);}
.notes-wrap{margin:0 18px 12px;}
.notes-label{font-size:var(--fs-label);font-weight:var(--fw-label);letter-spacing:var(--ls-label);color:var(--dim);text-transform:uppercase;display:block;margin-bottom:6px;}

/* ── PHYSIO REST BANNER ── */
.physio-banner{margin:12px 18px 4px;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green);line-height:1.6;}

</style>
</head>
<body>

<div class="lock-screen" id="lockScreen" style="display:none">
  <div class="lock-logo">FORGE</div>
  <div class="lock-sub">Personal fitness. Private by default.<br>Enter your access token to continue.</div>
  <input class="lock-input" id="lockInput" type="password" placeholder="Access token" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLock()">
  <button class="lock-btn" onclick="submitLock()">Unlock</button>
  <div class="lock-err" id="lockErr"></div>
</div>

<div class="hdr">
  <div class="logo">FORGE<span class="sync-dot" id="syncDot" title="Cloud sync status"></span></div>
  <div style="display:flex;align-items:center"><div class="target-pill">PERSONAL</div><button class="hdr-burger" onclick="openDrawer()" aria-label="Menu">☰</button></div>
</div>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div id="drawerContent"></div></div>
<div class="forge-chat-overlay" id="forgeChatOverlay" onclick="closeForgeChat()"></div>
<div class="forge-chat-modal" id="forgeChatModal">
  <div class="forge-chat-drag"></div>
  <div class="ai-chat-header">
    <span class="ai-chat-title-wrap"><span class="ai-chat-title-icon">🤖</span><span class="ai-chat-title">Ask Forge</span></span>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="ai-chat-clear" onclick="clearAiChat()">Clear</button>
      <button class="ai-chat-clear" onclick="closeForgeChat()" style="font-size:16px;padding:6px 9px;">✕</button>
    </div>
  </div>
  <div class="ai-chat-messages" id="aiChatMessages"></div>
  <div class="ai-chat-bar">
    <textarea class="ai-chat-inp" id="aiChatInp" placeholder="Ask anything  -  nutrition, exercises, progress, calf pain..." rows="2" maxlength="500" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiChat();}"></textarea>
    <button class="ai-chat-send" id="aiChatSend" onclick="sendAiChat()">Send</button>
  </div>
</div>
<div class="quote" id="quoteEl"><div class="quote-card"><span class="quote-body" id="quoteBody"></span><span class="quote-author" id="quoteAuthor"></span></div></div>
<div class="days" id="dayNav" style="display:none"></div>
<div class="ptr" id="ptr"><svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.3-5.6M20 4v4h-4"/></svg></div>
<div class="scroll" id="mainScroll"><div id="tc"></div></div>

<div class="bot-nav">
  <div class="nav-item active" id="nav-workout" onclick="go('workout')"><div class="nav-icon">
    <svg class="icon-line" viewBox="0 0 24 24"><path d="M6.5 6.5v11M17.5 6.5v11M3 9.5v5M21 9.5v5M6.5 12h11"/></svg>
    <svg class="icon-fill" viewBox="0 0 24 24"><rect x="5.5" y="6" width="3" height="12" rx="1.5"/><rect x="15.5" y="6" width="3" height="12" rx="1.5"/><rect x="2.3" y="9" width="2.2" height="6" rx="1.1"/><rect x="19.5" y="9" width="2.2" height="6" rx="1.1"/><rect x="8.5" y="11" width="7" height="2" rx="1"/></svg>
  </div><div>Workout</div></div>
  <div class="nav-item" id="nav-nutrition" onclick="go('nutrition')"><div class="nav-icon">
    <svg class="icon-line" viewBox="0 0 24 24"><path d="M12 8c0-2.5 1.5-4 3.5-4M12 8c-4.5-2.5-9 1-7.5 6.5C5.5 18.5 8 21 10 21c1 0 1.3-.5 2-.5s1 .5 2 .5c2 0 4.5-2.5 5.5-6.5C21 9 16.5 5.5 12 8z"/></svg>
    <svg class="icon-fill" viewBox="0 0 24 24"><path d="M12 8c-4.5-2.5-9 1-7.5 6.5C5.5 18.5 8 21 10 21c1 0 1.3-.5 2-.5s1 .5 2 .5c2 0 4.5-2.5 5.5-6.5C21 9 16.5 5.5 12 8z"/><path d="M12 7.2c0-1.8 1.1-3 2.6-3.4a3.3 3.3 0 0 1-2.6 3.4z"/></svg>
  </div><div>Nutrition</div></div>
  <div class="nav-item" id="nav-settings" onclick="go('settings')"><div class="nav-icon">
    <svg class="icon-line" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3.9a7 7 0 0 0-2-1.2L14.2 3h-4l-.4 2.6a7 7 0 0 0-2 1.2l-2.3-.9-2 3.4 2 1.5a7 7 0 0 0 0 2.4l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 2 1.2l.4 2.6h4l.4-2.6a7 7 0 0 0 2-1.2l2.3.9 2-3.4-2-1.5c.07-.4.1-.8.1-1.2z"/></svg>
    <svg class="icon-fill" viewBox="0 0 24 24"><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3.9a7 7 0 0 0-2-1.2L14.2 3h-4l-.4 2.6a7 7 0 0 0-2 1.2l-2.3-.9-2 3.4 2 1.5a7 7 0 0 0 0 2.4l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 2 1.2l.4 2.6h4l.4-2.6a7 7 0 0 0 2-1.2l2.3.9 2-3.4-2-1.5c.07-.4.1-.8.1-1.2z"/><circle cx="12" cy="12" r="3.2" fill="var(--s0)"/></svg>
  </div><div>Settings</div></div>
  <div class="nav-item" id="nav-askforge" onclick="openForgeChat()"><div class="nav-icon"><svg class="icon-line" viewBox="0 0 24 24"><path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-4 4v-4H6a2 2 0 0 1-2-2V6z"/></svg></div><div>Ask Forge</div></div>
</div>

<div class="toast" id="toast"></div>

<div class="rest-timer-overlay" id="restOverlay">
  <div class="rest-timer-num" id="restNum">30</div>
  <div class="rest-timer-lbl">Rest</div>
  <br>
  <button class="rest-timer-skip" onclick="skipRest()">Skip</button>
</div>

<div class="plan-modal" id="planModal"></div>

<div class="summary" id="sum">
  <div class="sum-inner">
    <div class="sum-icon">🔥</div>
    <div class="sum-title">Session Complete</div>
    <div class="sum-sub">You showed up. That's everything.</div>
    <div class="sum-stats">
      <div class="sum-stat"><div class="sum-val" id="sumDur">-</div><div class="sum-lbl">Duration</div></div>
      <div class="sum-stat"><div class="sum-val" id="sumSets">-</div><div class="sum-lbl">Sets Done</div></div>
    </div>
    <button class="sum-close" onclick="closeSummary()">Back to Forge</button>
  </div>
</div>
<div class="summary" id="milestoneModal">
  <div class="sum-inner">
    <div class="sum-icon" id="msIcon"></div>
    <div class="sum-title" id="msTitle"></div>
    <div class="sum-sub" id="msSub"></div>
    <button class="sum-close" onclick="closeMilestone()">Keep Going →</button>
  </div>
</div>

<script src="config.local.js"></script>
<script src="/dist/app.js"></script>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js").then(reg=>{
    reg.addEventListener("updatefound",()=>{
      const sw=reg.installing;
      sw.addEventListener("statechange",()=>{
        if(sw.state==="installed"&&navigator.serviceWorker.controller){
          navigator.serviceWorker.addEventListener("controllerchange",()=>location.reload());
        }
      });
    });
  });
}
</script>
</body>
</html>
